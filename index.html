<style>

  .carga-marca { position: relative; width: 104px; height: 104px; margin: 0 auto 22px; }

  .splash[hidden] { display: none; }
  .splash.saliendo { opacity: 0; pointer-events: none; }
  /* Líneas de un pentagrama musical (5) intercaladas con el «Bienvenido/a
     a», el título y el botón —una encima del eyebrow, otra encima del
     título, otra debajo, y dos más debajo del botón— entrando desde fuera
     de la pantalla hacia el centro, una sola vez (sin bucle). Cada fila
     (línea o elemento) mide exactamente lo mismo, así que la distancia
     entre una línea y la siguiente es siempre idéntica pase lo que pase en
     medio; el contenido se centra dentro de su fila. La altura de fila es
     fija y compacta a propósito: si un elemento (el título) es más alto

  .splash-fila { display: flex; align-items: center; justify-content: center; height: clamp(34px, 6.5vh, 44px); }

    pointer-events: none;

  .splash.animar .splash-linea {

  @keyframes pentagrama-entra { to { transform: translateX(0); opacity: 1; } }
  .splash-eyebrow {

<script>
/* =========================================================================
   Lectura de Google Sheets (endpoint gviz de hojas compartidas en lectura)
   ========================================================================= */

async function leerPestana(nombre) {
  const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&headers=1&sheet=${encodeURIComponent(nombre)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`No se pudo leer la pestaña ${nombre} (HTTP ${res.status}).`);
  const texto = await res.text();
  // La respuesta viene envuelta en google.visualization.Query.setResponse(...)
  const ini = texto.indexOf('(');
  const fin = texto.lastIndexOf(')');
  if (ini === -1 || fin === -1) throw new Error(`Respuesta inesperada al leer ${nombre}. ¿Está la hoja compartida como "Cualquier persona con el enlace: Lector"?`);
  const json = JSON.parse(texto.slice(ini + 1, fin));
  if (json.status === 'error') {
    throw new Error(`Google Sheets devolvió un error al leer ${nombre}: ${(json.errors || []).map(e => e.detailed_message || e.message).join('; ')}`);
  }
  const etiquetas = json.table.cols.map(c => String(c.label || '').trim());
  return json.table.rows.map(fila => {
    const obj = {};
    etiquetas.forEach((et, i) => {
      if (!et) return;
      const celda = fila.c && fila.c[i];
      let v = celda ? celda.v : null;
      if (v === null || v === undefined) v = '';
      else if (typeof v === 'boolean') v = v ? 'TRUE' : 'FALSE';
      else if (typeof v === 'string' && v.startsWith('Date(')) v = (celda.f || v); // fechas: usar el formato visible
      obj[et] = v;
    });
    return obj;
  }).filter(obj => Object.values(obj).some(v => v !== ''));
}

async function cargarDatos() {
  const [configFilas, alumnos, equipos, jornadas, registros, criterios, evaluaciones, insignias, insigniasAlumnos, cursos, grupos] = await Promise.all([
    leerPestana('CONFIG'), leerPestana('ALUMNOS'), leerPestana('EQUIPOS'),
    leerPestana('JORNADAS'), leerPestana('REGISTROS'),
    leerPestana('CRITERIOS'), leerPestana('EVALUACIONES'), leerPestana('INSIGNIAS'), leerPestana('INSIGNIAS_ALUMNOS'),
    leerPestana('CURSOS'), leerPestana('GRUPOS'),
  ]);
  const config = {};
  configFilas.forEach(f => { config[String(f.clave)] = f.valor; });
  return { config, alumnos, equipos, jornadas, registros, criterios, evaluaciones, insignias, insigniasAlumnos, cursos, grupos };
}

/* =========================================================================
   Clasificaciones (solo jornadas con estado_publicacion = publicada)
   ========================================================================= */

const num = v => { const n = Number(v); return Number.isFinite(n) ? n : 0; };
const activo = x => String(x.activo).toUpperCase() !== 'FALSE' && String(x.activo) !== '0';
const fmtMedia = n => n.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

/* ---------- Cursos y grupos (estructura de clase real, aparte de los equipos de la liga) ---------- */

function cursosActivos(datos) {
  return datos.cursos.filter(activo).slice().sort((a, b) => a.nombre_curso.localeCompare(b.nombre_curso, 'es'));
}
function gruposActivos(datos) {
  return datos.grupos.filter(activo).slice().sort((a, b) => a.nombre_grupo.localeCompare(b.nombre_grupo, 'es'));
}
function gruposDeCurso(datos, idCurso) {
  return gruposActivos(datos).filter(g => String(g.id_curso) === String(idCurso));
}
function cursoDe(datos, idCurso) {
  return datos.cursos.find(c => String(c.id_curso) === String(idCurso)) || null;
}
function grupoDe(datos, idGrupo) {
  return datos.grupos.find(g => String(g.id_grupo) === String(idGrupo)) || null;
}
/** El id de curso del alumno: el asignado directamente, o si no tiene, el de su grupo. */
function idCursoDeAlumno(datos, alumno) {
  if (alumno.id_curso) return alumno.id_curso;
  const g = grupoDe(datos, alumno.id_grupo);
  return g ? g.id_curso : null;
}
/** El curso del alumno (objeto completo). */
function cursoDeAlumno(datos, alumno) {
  const idCurso = idCursoDeAlumno(datos, alumno);
  return idCurso ? cursoDe(datos, idCurso) : null;
}
/** "1º ESO A" — nombre del curso + nombre del grupo, o solo el grupo si no tiene curso. */
function nombreGrupoCompleto(datos, idGrupo) {
  const g = grupoDe(datos, idGrupo);
  if (!g) return '';
  const c = cursoDe(datos, g.id_curso);
  return c ? `${c.nombre_curso} ${g.nombre_grupo}` : g.nombre_grupo;
}
/** "1º ESO A", o solo "1º ESO" si el alumno tiene curso pero todavía no un grupo concreto. */
function lugarDeAlumno(datos, alumno) {
  if (alumno.id_grupo) return nombreGrupoCompleto(datos, alumno.id_grupo);
  const c = cursoDeAlumno(datos, alumno);
  return c ? c.nombre_curso : '';
}

/**
 * Las jornadas son sesiones propias de cada curso (no se comparten entre
 * cursos), así que además del trimestre se pueden filtrar por idCurso.
 * idCurso vacío/omitido = sin filtrar por curso (todas mezcladas).
 *
 * Dentro de un curso, una jornada puede ser además propia de un solo grupo
 * (id_grupo) — por ejemplo porque ese grupo ha tenido más o menos sesiones
 * que los demás — o compartida por todo el curso si no tiene grupo. Si se
 * indica idGrupo, se incluyen las jornadas de todo el curso MÁS las propias
 * de ese grupo, pero no las de otros grupos del mismo curso.
 */
function jornadasPublicadas(jornadas, trimestre, idCurso, idGrupo) {
  return jornadas.filter(j => {
    if (String(j.estado_publicacion).toLowerCase() !== 'publicada') return false;
    if (idCurso && String(j.id_curso) !== String(idCurso)) return false;
    if (idGrupo && j.id_grupo && String(j.id_grupo) !== String(idGrupo)) return false;
    return trimestre === 'curso' || String(j.trimestre) === String(trimestre);
  });
}

/**
 * La "más reciente" de una lista de jornadas. Como cada grupo puede tener su
 * propia numeración independiente (y las jornadas de todo el curso otra
 * distinta), el número por sí solo no sirve para comparar jornadas de
 * distinto grupo: se ordena por fecha y solo se usa el número como
 * desempate si la fecha coincide o falta.
 */
function jornadaMasRecienteDeLista(lista) {
  if (!lista || lista.length === 0) return null;
  return lista.reduce((mejor, j) => {
    const fj = String(j.fecha || ''), fm = String(mejor.fecha || '');
    if (fj !== fm) return fj > fm ? j : mejor;
    return num(j.numero_jornada) > num(mejor.numero_jornada) ? j : mejor;
  }, lista[0]);
}

/** Orden cronológico ascendente (por fecha, número como desempate) para listas de jornadas mezclando alcances. */
function compararFechaJornada(a, b) {
  const fa = String(a.fecha || ''), fb = String(b.fecha || '');
  if (fa !== fb) return fa < fb ? -1 : 1;
  return num(a.numero_jornada) - num(b.numero_jornada);
}

/**
 * Jornada que se muestra en la tarjeta "Jornada actual" del Dashboard, para
 * el curso (y grupo, si se indica) seleccionados. Si hay una jornada elegida
 * a mano en Liga → Configuración y encaja en ese alcance, se respeta; si no,
 * se usa siempre la más reciente entre las publicadas del alcance.
 */
function jornadaActual(datos, idManual, idCurso, idGrupo) {
  if (idManual) {
    const manual = datos.jornadas.find(j => String(j.id_jornada) === String(idManual));
    if (manual && (!idCurso || String(manual.id_curso) === String(idCurso)) &&
        (!idGrupo || !manual.id_grupo || String(manual.id_grupo) === String(idGrupo))) return manual;
  }
  const publicadas = datos.jornadas.filter(j =>
    String(j.estado_publicacion).toLowerCase() === 'publicada' &&
    (!idCurso || String(j.id_curso) === String(idCurso)) &&
    (!idGrupo || !j.id_grupo || String(j.id_grupo) === String(idGrupo)));
  return jornadaMasRecienteDeLista(publicadas);
}

function registrosValidos(datos, trimestre, idCurso) {
  const ids = new Set(jornadasPublicadas(datos.jornadas, trimestre, idCurso).map(j => String(j.id_jornada)));
  return datos.registros.filter(r => ids.has(String(r.id_jornada)));
}

function clasIndividual(datos, trimestre, idGrupo, idCursoDirecto) {
  // Las jornadas son propias de cada curso: el del grupo elegido si hay uno,
  // o si no el curso indicado directamente (p. ej. el del selector del dashboard).
  const idCurso = idGrupo ? (grupoDe(datos, idGrupo) || {}).id_curso : (idCursoDirecto || null);

  const acc = new Map();
  for (const r of registrosValidos(datos, trimestre, idCurso)) {
    const id = String(r.id_alumno);
    if (!acc.has(id)) acc.set(id, { puntos: 0, jornadas: 0 });
    const a = acc.get(id); a.puntos += num(r.total); a.jornadas += 1;
  }

  const ultima = jornadaMasRecienteDeLista(jornadasPublicadas(datos.jornadas, trimestre, idCurso, idGrupo));
  const puntosUltima = new Map();
  if (ultima) {
    datos.registros.forEach(r => {
      if (String(r.id_jornada) === String(ultima.id_jornada)) puntosUltima.set(String(r.id_alumno), num(r.total));
    });
  }

  const eqById = new Map(datos.equipos.map(e => [String(e.id_equipo), e]));
  const filas = datos.alumnos
    .filter(activo)
    .filter(a => !idGrupo || String(a.id_grupo) === String(idGrupo))
    .filter(a => !idCurso || String(idCursoDeAlumno(datos, a)) === String(idCurso))
    .map(a => {
    const s = acc.get(String(a.id_alumno)) || { puntos: 0, jornadas: 0 };
    const eq = eqById.get(String(a.id_equipo_actual));
    return {
      id: String(a.id_alumno),
      nombre: a.nombre_publico || '—',
      equipo: eq ? eq.nombre_equipo : '—',
      color: eq ? eq.color : null,
      escudo: eq ? eq.escudo : null,
      puntos: s.puntos, jornadas: s.jornadas,
      media: s.jornadas > 0 ? s.puntos / s.jornadas : 0,
      puntosUltima: puntosUltima.get(String(a.id_alumno)),
      numeroUltima: ultima ? num(ultima.numero_jornada) : null,
    };
  });
  filas.sort((a, b) => b.puntos - a.puntos || b.media - a.media || a.nombre.localeCompare(b.nombre, 'es'));
  filas.forEach((f, i) => f.pos = i + 1);
  return filas;
}

function clasEquipos(datos, trimestre, idCurso) {
  const acc = new Map();
  const accAlumno = new Map();
  for (const r of registrosValidos(datos, trimestre, idCurso)) {
    const id = String(r.id_equipo_en_jornada);
    if (id) {
      if (!acc.has(id)) acc.set(id, { puntos: 0, registros: 0 });
      const e = acc.get(id); e.puntos += num(r.total); e.registros += 1;
    }
    const idAl = String(r.id_alumno);
    if (!accAlumno.has(idAl)) accAlumno.set(idAl, { puntos: 0, jornadas: 0 });
    const al = accAlumno.get(idAl); al.puntos += num(r.total); al.jornadas += 1;
  }

  const ultima = jornadaMasRecienteDeLista(jornadasPublicadas(datos.jornadas, trimestre, idCurso));
  const accUltima = new Map();
  if (ultima) {
    datos.registros.forEach(r => {
      if (String(r.id_jornada) !== String(ultima.id_jornada)) return;
      const id = String(r.id_equipo_en_jornada);
      if (!id) return;
      if (!accUltima.has(id)) accUltima.set(id, { puntos: 0, registros: 0 });
      const e = accUltima.get(id); e.puntos += num(r.total); e.registros += 1;
    });
  }

  const filas = datos.equipos
    .filter(activo)
    .filter(e => !idCurso || String(e.id_curso) === String(idCurso))
    .map(e => {
    const s = acc.get(String(e.id_equipo)) || { puntos: 0, registros: 0 };
    const n = datos.alumnos.filter(a => activo(a) && String(a.id_equipo_actual) === String(e.id_equipo)).length;
    const sUltima = accUltima.get(String(e.id_equipo));

    const medias = datos.alumnos
      .filter(a => activo(a) && String(a.id_equipo_actual) === String(e.id_equipo))
      .map(a => accAlumno.get(String(a.id_alumno)))
      .filter(al => al && al.jornadas > 0)
      .map(al => al.puntos / al.jornadas);
    let equilibrio = null;
    if (medias.length >= 2) {
      const mediaGrupo = medias.reduce((s, v) => s + v, 0) / medias.length;
      const varianza = medias.reduce((s, v) => s + (v - mediaGrupo) ** 2, 0) / medias.length;
      equilibrio = Math.sqrt(varianza);
    }

    return {
      id: String(e.id_equipo),
      equipo: e.nombre_equipo, color: e.color, escudo: e.escudo,
      puntos: s.puntos, registros: s.registros, alumnos: n,
      media: s.registros > 0 ? s.puntos / s.registros : 0,
      puntosUltima: sUltima ? sUltima.puntos : null,
      mediaUltima: sUltima && sUltima.registros > 0 ? sUltima.puntos / sUltima.registros : null,
      numeroUltima: ultima ? num(ultima.numero_jornada) : null,
      equilibrio,
    };
  });
  filas.sort((a, b) => b.media - a.media || b.puntos - a.puntos || a.equipo.localeCompare(b.equipo, 'es'));
  filas.forEach((f, i) => f.pos = i + 1);
  return filas;
}

/* =========================================================================
   Tendencia de la clasificación (sube / baja / se mantiene)
   ========================================================================= */

/** Lee un flag de CONFIG tipo TRUE/FALSE; si no está definido, se considera activado. */
const configActivo = (valor, porDefecto = true) => {
  if (valor === undefined || valor === null || valor === '') return porDefecto;
  return String(valor).toUpperCase() !== 'FALSE';
};

/** La jornada publicada más reciente dentro del alcance (trimestre, curso y grupo). */
function jornadaMasReciente(jornadas, trimestre, idCurso, idGrupo) {
  return jornadaMasRecienteDeLista(jornadasPublicadas(jornadas, trimestre, idCurso, idGrupo));
}

/**
 * Mapa id → 'subio' | 'bajo' | 'igual' | 'nuevo', comparando la clasificación
 * actual con la que había antes de contar la última jornada publicada del
 * alcance. `tipo` es 'individual' o 'equipos'.
 */
function tendencias(datos, trimestre, filasActuales, tipo, idFiltro, idCursoDirecto) {
  const mapa = new Map();
  // Las jornadas son propias de cada curso: para 'equipos' idFiltro ya es el
  // curso; para 'individual' es un grupo, del que hay que sacar su curso (o,
  // si no hay grupo elegido, el curso indicado directamente).
  const idCurso = tipo === 'equipos' ? idFiltro : (idFiltro ? (grupoDe(datos, idFiltro) || {}).id_curso : (idCursoDirecto || null));
  const idGrupoTend = tipo === 'individual' ? idFiltro : null;
  const ultima = jornadaMasReciente(datos.jornadas, trimestre, idCurso, idGrupoTend);
  if (!ultima) return mapa;
  const datosAntes = { ...datos, jornadas: datos.jornadas.filter(j => String(j.id_jornada) !== String(ultima.id_jornada)) };
  const filasAntes = tipo === 'equipos' ? clasEquipos(datosAntes, trimestre, idFiltro) : clasIndividual(datosAntes, trimestre, idFiltro, idCursoDirecto);
  const posAntes = new Map(filasAntes.map(f => [f.id, f.pos]));
  filasActuales.forEach(f => {
    const antes = posAntes.get(f.id);
    if (antes === undefined) { mapa.set(f.id, { t: 'nuevo', n: 0 }); return; }
    if (antes > f.pos) mapa.set(f.id, { t: 'subio', n: antes - f.pos });
    else if (antes < f.pos) mapa.set(f.id, { t: 'bajo', n: f.pos - antes });
    else mapa.set(f.id, { t: 'igual', n: 0 });
  });
  return mapa;
}

/** `info` es { t: 'subio'|'bajo'|'igual'|'nuevo', n: puestos de diferencia }, tal como lo deja tendencias(). */
function badgeTendencia(info) {
  if (!info) return '';
  // El número de puestos se puede ocultar sin desactivar las flechas (ajuste
  // aparte en Admin → Liga): así se puede enseñar solo si sube/baja, sin
  // decir cuánto.
  const conNumero = configActivo(DATOS.config.mostrar_tendencia_numero, true);
  const n = conNumero && info.n ? `<span class="tendencia-num">${info.n}</span>` : '';
  if (info.t === 'subio') return `<span class="tendencia tendencia-sube" title="Ha subido ${info.n} puesto${info.n === 1 ? '' : 's'} desde la última jornada">▲${n}</span>`;
  if (info.t === 'bajo') return `<span class="tendencia tendencia-baja" title="Ha bajado ${info.n} puesto${info.n === 1 ? '' : 's'} desde la última jornada">▼${n}</span>`;
  if (info.t === 'nuevo') return `<span class="tendencia tendencia-nuevo" title="Nueva incorporación a la clasificación">●</span>`;
  if (info.t === 'igual') return `<span class="tendencia tendencia-igual" title="Se mantiene desde la última jornada">▬</span>`;
  return '';
}

/* =========================================================================
   Diana de evaluación (criterios personalizables por el profesor)
   ========================================================================= */

const PERIODOS_DIANA = [['inicial', 'Evaluación inicial'], ['1', '1.º trimestre'], ['2', '2.º trimestre'], ['3', '3.º trimestre']];

function criteriosActivos(datos) {
  return datos.criterios
    .filter(activo)
    .slice()
    .sort((a, b) => num(a.orden) - num(b.orden) || String(a.nombre).localeCompare(String(b.nombre), 'es'));
}

/** Valoraciones (0-5) de un alumno en un periodo, una por cada criterio activo. */
function dianaAlumno(datos, idAlumno, periodo) {
  const valores = new Map();
  datos.evaluaciones.forEach(e => {
    if (String(e.id_alumno) === String(idAlumno) && String(e.periodo) === String(periodo)) {
      valores.set(String(e.id_criterio), e.valor);
    }
  });
  return criteriosActivos(datos).map(c => {
    const v = valores.get(String(c.id_criterio));
    const evaluado = v !== undefined && v !== '';
    return { id: String(c.id_criterio), nombre: c.nombre || '—', valor: evaluado ? num(v) : 0, evaluado };
  });
}

/** Refleja localmente (sin esperar a Google) un lote de valoraciones ya guardado en el servidor. */
function aplicarEvaluacionesLocal(valoraciones) {
  valoraciones.forEach(v => {
    const i = DATOS.evaluaciones.findIndex(ev =>
      String(ev.id_alumno) === String(v.id_alumno) &&
      String(ev.periodo) === String(v.periodo) &&
      String(ev.id_criterio) === String(v.id_criterio));
    const nuevo = { id_alumno: v.id_alumno, periodo: v.periodo, id_criterio: v.id_criterio, valor: v.valor };
    if (i >= 0) DATOS.evaluaciones[i] = nuevo; else DATOS.evaluaciones.push(nuevo);
  });
}

/** Diana radar (estilo FIFA): un eje por criterio, valores 0-5, anillos concéntricos. */
function svgDiana(ejes) {
  if (ejes.length === 0) return `<p class="grafico-vacio">Todavía no hay criterios de evaluación configurados.</p>`;
  if (ejes.length < 3) return `<p class="grafico-vacio">Se necesitan al menos 3 criterios activos para dibujar la diana.</p>`;
  if (!ejes.some(e => e.evaluado)) return `<p class="grafico-vacio">Todavía no hay ninguna valoración guardada para este periodo.</p>`;

  // En móvil el SVG ocupa todo el ancho de la tarjeta (sin margen sobrante),
  // así que ahí se dibuja el anillo más pequeño dentro del mismo viewBox:
  // deja más espacio para las etiquetas y hace que el texto se lea mejor.
  const movil = window.matchMedia('(max-width: 640px)').matches;
  const n = ejes.length, max = 5;
  const cx = 180, cy = 180, R = movil ? 96 : 108;
  const margenEtiqueta = movil ? 18 : 20;
  const anguloIni = -Math.PI / 2;
  const paso = (Math.PI * 2) / n;
  const punto = (i, valor) => {
    const ang = anguloIni + i * paso;
    const r = (Math.max(0, Math.min(valor, max)) / max) * R;
    return [cx + r * Math.cos(ang), cy + r * Math.sin(ang)];
  };

  let anillos = '';
  for (let nivel = 1; nivel <= max; nivel++) {
    const pts = ejes.map((_, i) => punto(i, nivel).join(',')).join(' ');
    anillos += `<polygon points="${pts}" fill="none" class="rejilla" />`;
  }

  let radios = '';
  ejes.forEach((_, i) => {
    const [x, y] = punto(i, max);
    radios += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" class="rejilla" />`;
  });

  let etiquetas = '';
  ejes.forEach((e, i) => {
    const ang = anguloIni + i * paso;
    const cosv = Math.cos(ang), sinv = Math.sin(ang);
    const lx = cx + (R + margenEtiqueta) * cosv;
    const ly = cy + (R + margenEtiqueta) * sinv;
    const anchor = Math.abs(cosv) < 0.25 ? 'middle' : (cosv > 0 ? 'start' : 'end');
    // En escritorio la tarjeta suele ser más ancha que el propio SVG (que
    // tiene max-width:380px), así que ese margen sobrante absorbe el
    // desbordamiento y el nombre se ve completo, como siempre. En móvil el
    // SVG ocupa toda la tarjeta, así que en vez de arriesgarse a que un
    // nombre largo se corte contra el borde, se muestra el código corto del
    // criterio (p. ej. "C01") y el nombre completo se ve al tocarlo.
    const nombreMostrado = movil ? e.id : e.nombre;
    etiquetas += `<text class="eje-txt diana-eje-txt"${movil ? ` data-tip="<b>${esc(e.id)}</b><br>${esc(e.nombre)}"` : ''} x="${lx}" y="${ly + (sinv > 0.6 ? 11 : sinv < -0.6 ? -3 : 4)}" text-anchor="${anchor}">${esc(nombreMostrado)}</text>`;
  });

  const puntosDatos = ejes.map((e, i) => punto(i, e.valor));
  const dPoly = puntosDatos.map(p => p.join(',')).join(' ');
  let vertices = '';
  ejes.forEach((e, i) => {
    const [x, y] = puntosDatos[i];
    const tip = `<b>${esc(e.nombre)}</b><br>${e.evaluado ? e.valor + ' / 5' : 'Sin evaluar'}`;
    vertices += `<circle class="punto" data-tip="${tip}" cx="${x}" cy="${y}" r="4" fill="var(--gold)" stroke="var(--night-2)" stroke-width="2" />`;
  });

  return `<div class="grafico-wrap"><div class="grafico-tooltip"></div>
    <svg class="grafico" width="100%" height="${movil ? 300 : 320}" viewBox="0 0 360 360" style="max-width:380px; display:block; margin:0 auto; overflow:visible">
      ${anillos}
      ${radios}
      <polygon points="${dPoly}" fill="var(--gold)" fill-opacity="0.18" stroke="var(--gold)" stroke-width="2" stroke-linejoin="round" />
      ${vertices}
      ${etiquetas}
    </svg></div>`;
}

/* =========================================================================
   Ficha del alumno (datos + gráficas individuales)
   ========================================================================= */

/**
 * Insignias que tiene un alumno en el periodo, agrupadas por tipo con las
 * jornadas concretas en las que se consiguió cada una (solo cuenta jornadas
 * publicadas).
 */
function insigniasAlumnoDetalle(datos, idAlumno, trimestre) {
  const alumno = datos.alumnos.find(a => String(a.id_alumno) === String(idAlumno));
  const idCurso = alumno ? idCursoDeAlumno(datos, alumno) : null;
  const idsJornadas = new Set(jornadasPublicadas(datos.jornadas, trimestre, idCurso, alumno ? alumno.id_grupo : null).map(j => String(j.id_jornada)));
  const jornadasPorId = new Map(datos.jornadas.map(j => [String(j.id_jornada), j]));
  const porInsignia = new Map();
  datos.insigniasAlumnos.forEach(x => {
    if (String(x.id_alumno) !== String(idAlumno)) return;
    if (!idsJornadas.has(String(x.id_jornada))) return;
    const id = String(x.id_insignia);
    if (!porInsignia.has(id)) porInsignia.set(id, []);
    const j = jornadasPorId.get(String(x.id_jornada));
    if (j) porInsignia.get(id).push(j);
  });
  const porId = new Map(datos.insignias.map(i => [String(i.id_insignia), i]));
  return [...porInsignia.entries()]
    .map(([id, jornadas]) => ({
      insignia: porId.get(id),
      jornadas: jornadas.slice().sort((a, b) => num(b.numero_jornada) - num(a.numero_jornada)),
    }))
    .filter(x => x.insignia && activo(x.insignia))
    .sort((a, b) => b.jornadas.length - a.jornadas.length || a.insignia.nombre.localeCompare(b.insignia.nombre, 'es'));
}

/** Tarjeta grande de una insignia conseguida por el alumno: escudo (o icono) y en qué jornadas. */
function tarjetaInsigniaAlumnoHTML(item) {
  const ins = item.insignia;
  const imagen = ins.imagen
    ? `<div class="imagen-fama" style="background-image:url('${esc(ins.imagen)}')"></div>`
    : `<div class="imagen-fama">${esc(ins.icono || '🎖️')}</div>`;
  const jornadasTxt = item.jornadas.map(j => 'J' + esc(j.numero_jornada)).join(', ');
  return `<div class="tarjeta-fama">
    ${imagen}
    <h3 style="margin:10px 0 2px">${esc(ins.nombre)}</h3>
    <p class="secundario">${jornadasTxt}</p>
  </div>`;
}

/** Icono de una insignia (resumen) junto al número de veces conseguida. */
function chipInsigniaHTML(insignia, n) {
  const icono = `<span style="font-size:22px;line-height:1">${esc(insignia.icono || '🎖️')}</span>`;
  return `<span title="${esc(insignia.nombre)}" style="display:inline-flex;align-items:center;gap:6px;background:rgba(8,15,28,0.5);border:1px solid rgba(30,92,65,0.5);border-radius:9px;padding:6px 10px">${icono}<span style="font-size:13px;color:var(--muted)">×${n}</span></span>`;
}

function datosAlumno(datos, id) {
  const a = datos.alumnos.find(x => String(x.id_alumno) === String(id));
  if (!a) return null;
  const eq = datos.equipos.find(e => String(e.id_equipo) === String(a.id_equipo_actual));
  return { a, eq };
}

function statsAlumno(datos, id, trimestre) {
  const alumno = datos.alumnos.find(a => String(a.id_alumno) === String(id));
  const idCurso = alumno ? idCursoDeAlumno(datos, alumno) : null;
  const filas = registrosValidos(datos, trimestre, idCurso).filter(r => String(r.id_alumno) === String(id));
  const puntos = filas.reduce((s, r) => s + num(r.total), 0);
  const jornadas = filas.length;
  return { puntos, jornadas, media: jornadas > 0 ? puntos / jornadas : 0 };
}

/** Puntos del alumno en cada jornada publicada de su curso en el periodo, en orden cronológico. */
function serieJornadas(datos, id, trimestre) {
  const alumno = datos.alumnos.find(a => String(a.id_alumno) === String(id));
  const idCurso = alumno ? idCursoDeAlumno(datos, alumno) : null;
  const js = jornadasPublicadas(datos.jornadas, trimestre, idCurso, alumno ? alumno.id_grupo : null)
    .slice()
    .sort(compararFechaJornada);
  const regs = new Map(
    datos.registros
      .filter(r => String(r.id_alumno) === String(id))
      .map(r => [String(r.id_jornada), r])
  );
  return js.map(j => {
    const r = regs.get(String(j.id_jornada));
    return {
      numero: num(j.numero_jornada),
      titulo: j.titulo || 'Jornada',
      trimestre: String(j.trimestre),
      puntos: r ? num(r.total) : 0,
      jugada: !!r,
    };
  });
}

/* ---------- Utilidades de gráficas SVG (sin librerías externas) ---------- */

/** Activa el tooltip flotante para cualquier elemento [data-tip] dentro de un .grafico-wrap. */
function wireTooltips(root) {
  root.querySelectorAll('.grafico-wrap').forEach(wrap => {
    const tip = wrap.querySelector('.grafico-tooltip');
    if (!tip) return;
    let tocado = null;
    const posicionar = (x, y) => {
      const r = wrap.getBoundingClientRect();
      tip.style.left = (x - r.left) + 'px';
      tip.style.top = (y - r.top - 10) + 'px';
    };
    wrap.querySelectorAll('[data-tip]').forEach(el => {
      el.addEventListener('mouseenter', () => { tip.innerHTML = el.dataset.tip; tip.classList.add('on'); });
      el.addEventListener('mousemove', e => posicionar(e.clientX, e.clientY));
      el.addEventListener('mouseleave', () => tip.classList.remove('on'));
      // En pantallas táctiles no hay "hover": un toque muestra el tooltip
      // junto al elemento, y volver a tocarlo (o tocar fuera) lo cierra.
      el.addEventListener('click', e => {
        e.stopPropagation();
        if (tocado === el) { tip.classList.remove('on'); tocado = null; return; }
        tocado = el;
        tip.innerHTML = el.dataset.tip;
        const er = el.getBoundingClientRect();
        posicionar(er.left + er.width / 2, er.top);
        tip.classList.add('on');
      });
    });
    wrap.addEventListener('click', () => { tip.classList.remove('on'); tocado = null; });
  });
}

/** Barras verticales: puntos obtenidos en cada jornada, sobre el máximo posible `maxY` (7 para un alumno,
    7 × integrantes para un equipo). Marca los cambios de trimestre. */
function svgBarrasJornada(serie, maxY = 10, campo = 'puntos', formatear = v => String(v), unidad = 'pts') {
  if (serie.length === 0) return `<p class="grafico-vacio">No hay jornadas publicadas en este periodo.</p>`;

  const multiTrimestre = serie.some((j, i) => i > 0 && j.trimestre !== serie[i - 1].trimestre);
  const alto = 190, padInf = 26, padIzq = 34, padDer = 12;
  const padSup = multiTrimestre ? 30 : 16;
  const anchoBarra = 20, gapBarra = 12;
  const n = serie.length;
  const ancho = padIzq + n * anchoBarra + (n - 1) * gapBarra + padDer;
  const y0 = alto - padInf;
  const escY = v => y0 - (Math.max(0, Math.min(v, maxY)) / maxY) * (y0 - padSup);
  const pasoEtiqueta = n <= 16 ? 1 : n <= 40 ? 5 : 10;

  let capas = '';
  [0, maxY / 2, maxY].forEach(v => {
    const y = escY(v);
    capas += `<line class="rejilla" x1="${padIzq}" x2="${ancho - padDer}" y1="${y}" y2="${y}" />
      <text class="eje-txt" x="${padIzq - 6}" y="${y + 3}" text-anchor="end">${fmtMedia(v).replace(/,00$/, '')}</text>`;
  });

  let prevTri = null;
  serie.forEach((j, i) => {
    const x = padIzq + i * (anchoBarra + gapBarra);
    if (multiTrimestre && j.trimestre !== prevTri) {
      if (i > 0) capas += `<line x1="${x - gapBarra / 2}" x2="${x - gapBarra / 2}" y1="${padSup - 8}" y2="${y0}" stroke="rgba(229,185,78,0.3)" stroke-dasharray="3,3" />`;
      capas += `<text class="eje-txt" x="${x}" y="${padSup - 14}" fill="var(--gold)" font-weight="600">${esc(j.trimestre)}º trim.</text>`;
      prevTri = j.trimestre;
    }
    const y = escY(j[campo]);
    const h = y0 - y;
    if (h > 0) {
      const r = Math.min(4, h);
      const color = j.jugada ? 'var(--gold)' : 'rgba(244,246,243,0.18)';
      const tip = `<b>J${j.numero}</b> · ${esc(j.titulo)}<br>${j.jugada ? formatear(j[campo]) + ' ' + unidad : 'No participó'}`;
      capas += `<path class="barra" data-tip="${tip}"
        d="M${x},${y0} L${x},${y + r} Q${x},${y} ${x + r},${y} L${x + anchoBarra - r},${y} Q${x + anchoBarra},${y} ${x + anchoBarra},${y + r} L${x + anchoBarra},${y0} Z"
        fill="${color}" />`;
    }
    if (i % pasoEtiqueta === 0 || i === n - 1) {
      capas += `<text class="eje-txt" x="${x + anchoBarra / 2}" y="${alto - 8}" text-anchor="middle">J${j.numero}</text>`;
    }
  });

  return `<div class="grafico-wrap"><div class="grafico-tooltip"></div>
    <div class="tabla-scroll"><svg class="grafico" width="${ancho}" height="${alto}" viewBox="0 0 ${ancho} ${alto}">
      ${capas}
      <line class="base" x1="${padIzq}" x2="${ancho - padDer}" y1="${y0}" y2="${y0}" />
    </svg></div></div>`;
}

/** Línea de puntos acumulados a lo largo de las jornadas del periodo. */
function svgLineaAcumulada(serie) {
  if (serie.length === 0) return `<p class="grafico-vacio">No hay datos suficientes.</p>`;

  const alto = 170, padSup = 16, padInf = 26, padIzq = 34, padDer = 46;
  const pasoX = 34;
  const n = serie.length;
  const ancho = padIzq + Math.max(1, n - 1) * pasoX + padDer;

  let acc = 0;
  const acumulado = serie.map(j => { acc += j.puntos; return acc; });
  const maxY = Math.max(10, Math.ceil(acc / 5) * 5);
  const y0 = alto - padInf;
  const escY = v => y0 - (v / maxY) * (y0 - padSup);
  const escX = i => padIzq + i * pasoX;

  let capas = '';
  [0, maxY / 2, maxY].forEach(v => {
    const y = escY(v);
    capas += `<line class="rejilla" x1="${padIzq}" x2="${ancho - padDer}" y1="${y}" y2="${y}" />
      <text class="eje-txt" x="${padIzq - 6}" y="${y + 3}" text-anchor="end">${Math.round(v)}</text>`;
  });

  const d = acumulado.map((v, i) => `${i === 0 ? 'M' : 'L'}${escX(i)},${escY(v)}`).join(' ');
  const area = `M${escX(0)},${y0} ` + acumulado.map((v, i) => `L${escX(i)},${escY(v)}`).join(' ') + ` L${escX(n - 1)},${y0} Z`;
  const puntos = acumulado.map((v, i) => {
    const tip = `<b>J${serie[i].numero}</b> · ${esc(serie[i].titulo)}<br>Acumulado: ${v} pts`;
    return `<circle class="punto" data-tip="${tip}" cx="${escX(i)}" cy="${escY(v)}" r="4" fill="var(--gold)" stroke="var(--night-2)" stroke-width="2" />`;
  }).join('');

  capas += `<path d="${area}" fill="var(--gold)" fill-opacity="0.10" stroke="none" />`;
  capas += `<path d="${d}" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" />`;
  capas += puntos;
  capas += `<text class="eje-txt" x="${escX(n - 1) + 8}" y="${escY(acumulado[n - 1]) + 4}" fill="var(--gold-light)" font-weight="600">${acumulado[n - 1]} pts</text>`;

  return `<div class="grafico-wrap"><div class="grafico-tooltip"></div>
    <div class="tabla-scroll"><svg class="grafico" width="${ancho}" height="${alto}" viewBox="0 0 ${ancho} ${alto}">
      ${capas}
      <line class="base" x1="${padIzq}" x2="${ancho - padDer}" y1="${y0}" y2="${y0}" />
    </svg></div></div>`;
}

/** Barras horizontales comparando una media propia con una o varias medias de referencia. */
function svgComparativa(valores, etiquetaPropia = 'Tú') {
  const altoBarra = 22, gapFila = 16, padSup = 10, padIzq = 100, padDer = 46;
  const anchoMax = 260;
  const alto = padSup + valores.length * (altoBarra + gapFila);
  const ancho = padIzq + anchoMax + padDer;
  const maxV = Math.max(...valores.map(v => v.valor), 1);

  const filas = valores.map((v, i) => {
    const y = padSup + i * (altoBarra + gapFila);
    const w = Math.max(2, (v.valor / maxV) * anchoMax);
    const r = Math.min(4, altoBarra / 2, w);
    const color = v.tuyo ? 'var(--gold)' : 'var(--ref)';
    const tip = `<b>${esc(v.etiqueta)}</b><br>${fmtMedia(v.valor)} pts/jornada`;
    return `
      <text class="eje-txt" x="${padIzq - 10}" y="${y + altoBarra / 2 + 4}" text-anchor="end">${esc(v.etiqueta)}</text>
      <path class="barra" data-tip="${tip}"
        d="M${padIzq},${y} L${padIzq + w - r},${y} Q${padIzq + w},${y} ${padIzq + w},${y + r} L${padIzq + w},${y + altoBarra - r} Q${padIzq + w},${y + altoBarra} ${padIzq + w - r},${y + altoBarra} L${padIzq},${y + altoBarra} Z"
        fill="${color}" />
      <text class="eje-txt" x="${padIzq + w + 8}" y="${y + altoBarra / 2 + 4}" fill="var(--gold-light)">${fmtMedia(v.valor)}</text>`;
  }).join('');

  return `<div class="grafico-wrap"><div class="grafico-tooltip"></div>
    <svg class="grafico" width="${ancho}" height="${alto}" viewBox="0 0 ${ancho} ${alto}" style="max-width:100%">${filas}</svg></div>
    <div class="leyenda-mini">
      <span><span class="sw" style="background:var(--gold)"></span>${esc(etiquetaPropia)}</span>
      <span><span class="sw" style="background:var(--ref)"></span>Referencia</span>
    </div>`;
}

function datosEquipo(datos, id) {
  const e = datos.equipos.find(x => String(x.id_equipo) === String(id));
  if (!e) return null;
  const integrantes = datos.alumnos.filter(a => activo(a) && String(a.id_equipo_actual) === String(id));
  return { e, integrantes };
}

/** Suma de puntos del equipo en cada jornada publicada de su curso en el periodo, en orden cronológico. */
function serieJornadasEquipo(datos, id, trimestre) {
  const equipo = datos.equipos.find(e => String(e.id_equipo) === String(id));
  const idCurso = equipo ? equipo.id_curso : null;
  const js = jornadasPublicadas(datos.jornadas, trimestre, idCurso)
    .slice()
    .sort(compararFechaJornada);
  const porJornada = new Map();
  datos.registros.forEach(r => {
    if (String(r.id_equipo_en_jornada) !== String(id)) return;
    const clave = String(r.id_jornada);
    const acc = porJornada.get(clave) || { puntos: 0, registros: 0 };
    acc.puntos += num(r.total);
    acc.registros += 1;
    porJornada.set(clave, acc);
  });
  return js.map(j => {
    const acc = porJornada.get(String(j.id_jornada));
    return {
      numero: num(j.numero_jornada),
      titulo: j.titulo || 'Jornada',
      trimestre: String(j.trimestre),
      puntos: acc ? acc.puntos : 0,
      media: acc && acc.registros > 0 ? acc.puntos / acc.registros : 0,
      jugada: !!acc,
    };
  });
}


function tablaIntegrantes(filas) {

}

/** Escudo grande y sin fondo, para la ficha del equipo. Vacío si no hay imagen subida. */

/**
 * Bloque de podio (2º-1º-3º, con el 1º en el centro y más alto) para las
 * pestañas Individual y Equipos (no el Dashboard, que ya tiene sus propias
 * tarjetas de líder). Se puede apagar entero desde Admin → Liga.
 */
function renderPodio(filas, tipo) {
  if (!configActivo(DATOS.config.mostrar_podio, true)) return '';
  const top = filas.slice(0, 3).filter(f => f.pos <= 3);
  if (top.length < 2) return ''; // con 0 o 1 clasificado no hay podio que dibujar
  const orden = [top[1], top[0], top[2]].filter(Boolean); // 2º, 1º, 3º de izquierda a derecha

  const puesto = f => {
    const clase = f.pos === 1 ? 'p1' : f.pos === 2 ? 'p2' : 'p3';
    const alto = f.pos === 1 ? 132 : f.pos === 2 ? 96 : 72;
    let visual, nombre, dato, attr;
    if (tipo === 'equipos') {
      visual = f.escudo ? escudoEquipoHTML(f, 46) : (f.color ? dot(f.color) : '');
      nombre = f.equipo;
      dato = `${fmtMedia(f.media)} de media`;
      attr = ` data-equipo="${esc(f.id)}"`;
    } else {
      const alumno = DATOS.alumnos.find(a => String(a.id_alumno) === String(f.id));
      visual = alumno ? svgAvatar(alumno, { color: f.color }, 'pequeno') : '';
      nombre = f.nombre;
      dato = `${f.puntos} pts`;
      attr = ` data-alumno="${esc(f.id)}"`;
    }
    return `<a class="podio-puesto" href="#"${attr}>
      <span class="podio-visual">${visual}</span>
      <span class="podio-nombre">${esc(nombre)}</span>
      <span class="podio-dato">${esc(dato)}</span>
      <span class="podio-bloque ${clase}" style="height:${alto}px">${f.pos}</span>
    </a>`;
  };

  return `<div class="podio-top3">${orden.map(puesto).join('')}</div>`;
}

function pillsPeriodo() {
  return `<div class="pills">${PERIODOS_DIANA.map(([v, l]) =>
    `<button data-periodo="${v}" class="${DIANA_PERIODO === v ? 'on' : ''}">${l}</button>`).join('')}</div>`;
}

  return `<table><thead><tr>
      <th>Pos</th>${tendMap ? '<th></th>' : ''}<th>Alumno/a</th><th>Equipo</th><th class="num">Puntos</th>
      ${compacta ? '' : `<th class="num">Media</th><th class="num">Jornadas</th><th class="num">${numUltima ? 'J' + numUltima.numeroUltima : 'Última jornada'}</th>`}
    </tr></thead><tbody>${filas.map(f => `
    <tr class="${f.pos <= 3 ? 'podio' : ''}">
      <td>${badgePos(f.pos)}</td>
      ${tendMap ? `<td>${badgeTendencia(tendMap.get(f.id))}</td>` : ''}
      <td><a class="enlace" href="#" data-alumno="${esc(f.id)}"><strong>${esc(f.nombre)}</strong></a></td>
      <td>${escudoEquipoHTML(f, 20)}${esc(f.equipo)}</td>
      <td class="num pts">${f.puntos}</td>
      ${compacta ? '' : `<td class="num">${fmtMedia(f.media)}</td><td class="num" style="color:var(--muted)">${f.jornadas}</td><td class="num" style="color:var(--muted)">${f.puntosUltima != null ? f.puntosUltima : '—'}</td>`}

}

function tablaEquipos(filas, compacta, tendMap) {
  if (filas.length === 0) return `<p class="nota">Todavía no hay registros publicados en este trimestre.</p>`;
  const numUltima = filas.find(f => f.numeroUltima != null);
  const etiquetaUltima = numUltima ? 'J' + numUltima.numeroUltima : 'Última jornada';
  return `<table><thead><tr>
      <th>Pos</th>${tendMap ? '<th></th>' : ''}<th>Equipo</th><th class="num">Media</th><th class="num">Puntos</th>
      ${compacta ? '' : `<th class="num">Alumnos</th><th class="num">Media ${etiquetaUltima}</th><th class="num">Puntos ${etiquetaUltima}</th><th class="num">Equilibrio</th>`}
    </tr></thead><tbody>${filas.map(f => `
    <tr class="${f.pos === 1 ? 'podio' : ''}">
      <td>${badgePos(f.pos)}</td>
      ${tendMap ? `<td>${badgeTendencia(tendMap.get(f.id))}</td>` : ''}
      <td><a class="enlace" href="#" data-equipo="${esc(f.id)}"><strong>${escudoEquipoHTML(f, 20)}${esc(f.equipo)}</strong></a></td>
      <td class="num pts">${fmtMedia(f.media)}</td>
      <td class="num">${f.puntos}</td>
      ${compacta ? '' : `<td class="num" style="color:var(--muted)">${f.alumnos}</td><td class="num" style="color:var(--muted)">${f.mediaUltima != null ? fmtMedia(f.mediaUltima) : '—'}</td><td class="num" style="color:var(--muted)">${f.puntosUltima != null ? f.puntosUltima : '—'}</td><td class="num" style="color:var(--muted)">${f.equilibrio != null ? '±' + fmtMedia(f.equilibrio) : '—'}</td>`}
    </tr>`).join('')}</tbody></table>`;
}

/** Histórico público de jornadas publicadas: qué se hizo y qué tareas había en cada una. */
function listaJornadas(jornadas, trimestre, idCurso, idGrupo) {
  const pubs = jornadasPublicadas(jornadas, trimestre, idCurso, idGrupo)
    .slice()
    .sort((a, b) => compararFechaJornada(b, a));
  if (pubs.length === 0) return `<p class="nota">Todavía no hay jornadas publicadas en este periodo${idCurso ? ' para este curso' : ''}.</p>`;
  return pubs.map(j => `
    <div class="card" style="margin-bottom:14px">
      <div class="fila-titulo" style="margin-bottom:${j.descripcion || j.tareas ? '10px' : '0'}">
        <h3 style="margin:0">J${esc(j.numero_jornada)} · ${esc(j.titulo || 'Jornada')}${j.id_grupo ? ` <span class="secundario" style="font-weight:400">· ${esc(nombreGrupoCompleto(DATOS, j.id_grupo))}</span>` : ''}</h3>
        <span class="secundario" style="white-space:nowrap">${j.fecha ? esc(fmtFecha(j.fecha)) : ''}</span>
      </div>
      ${j.descripcion ? `<p class="secundario">${esc(j.descripcion)}</p>` : ''}
      ${j.tareas ? `<div class="extra-tarjeta"><span class="extra-titulo">Tareas</span><p class="extra-texto">${esc(j.tareas)}</p></div>` : ''}
    </div>`).join('');
}

/**
 * Convierte un texto plano (con líneas y párrafos separados por saltos de
 * línea normales) en HTML sencillo: los párrafos se separan por líneas en
 * blanco, y dentro de cada uno los saltos de línea sueltos se respetan.
 * Es el formato "antiguo" de las Reglas (de cuando el campo era un textarea
 * simple); se sigue reconociendo para no perder lo que ya hubiera escrito.
 */
function textoAParrafos(texto) {
  return String(texto || '').split(/\n{2,}/).map(parrafo => parrafo.trim()).filter(Boolean)
    .map(parrafo => `<p>${esc(parrafo).replace(/\n/g, '<br>')}</p>`).join('');
}

/** ¿Este texto ya parece HTML (del editor con formato) en vez de texto plano antiguo? */
function pareceHTML(texto) {
  return /<[a-z][\s\S]*>/i.test(String(texto || ''));
}

/** Etiquetas y propiedades de estilo que puede producir el editor de Reglas; todo lo demás se descarta. */
const ETIQUETAS_REGLAS_PERMITIDAS = new Set(['H1', 'H2', 'H3', 'H4', 'P', 'BR', 'B', 'STRONG', 'I', 'EM', 'U', 'UL', 'OL', 'LI', 'SPAN', 'DIV', 'BLOCKQUOTE', 'TABLE', 'TBODY', 'THEAD', 'TR', 'TH', 'TD']);
const ESTILOS_REGLAS_PERMITIDOS = new Set(['font-size', 'color', 'background-color', 'text-align', 'font-weight', 'font-style', 'text-decoration']);

const TAMANOS_FONT_LEGACY = { '1': 'xx-small', '2': 'x-small', '3': 'small', '4': 'medium', '5': 'large', '6': 'x-large', '7': 'xx-large' };

/**
 * Reemplaza en el propio editor (en vivo, sin volver a montar todo el HTML
 * ni perder el cursor) cualquier <font> que haya podido insertar el
 * navegador al aplicar un color, por un <span style="..."> equivalente.
 * Es la misma conversión que hace sanitizarHTML() al guardar; se repite
 * aquí para que lo que ve el profesor en el editor ya sea exactamente lo
 * que se va a guardar y publicar, sin depender de que styleWithCSS se haya
 * respetado (varía entre navegadores y versiones).
 */
function convertirFontASpanEnVivo(raiz) {
  raiz.querySelectorAll('font').forEach(f => {
    const span = document.createElement('span');
    const estilos = [];
    if (f.hasAttribute('color')) estilos.push(`color: ${f.getAttribute('color')}`);
    const tam = TAMANOS_FONT_LEGACY[f.getAttribute('size')];
    if (tam) estilos.push(`font-size: ${tam}`);
    if (estilos.length) span.setAttribute('style', estilos.join('; '));
    while (f.firstChild) span.appendChild(f.firstChild);
    f.replaceWith(span);
  });
}

/** De un valor de "style" (p. ej. pegado de Word/Google Docs/una web), se queda solo con las propiedades permitidas. */
function filtrarEstiloPermitido(valor) {
  return String(valor || '').split(';').map(p => p.trim()).filter(p => {
    const prop = p.split(':')[0].trim().toLowerCase();
    return ESTILOS_REGLAS_PERMITIDOS.has(prop) && !/url\(|expression\(|javascript:/i.test(p);
  }).join('; ');
}

/**
 * Limpia el HTML que escribe el profesor en el editor de Reglas antes de
 * guardarlo, y otra vez antes de mostrarlo a cualquier visitante: solo deja
 * pasar unas pocas etiquetas de texto/formato (nada de <script>, <img>,
 * enlaces ni atributos sueltos como onclick), para que ese contenido nunca
 * pueda colarse como código en la página pública, aunque el texto viniera
 * de otro sitio (p. ej. editando la hoja a mano).
 */
function sanitizarHTML(html) {
  const contenedor = document.createElement('div');
  contenedor.innerHTML = String(html || '');
  const limpiar = nodo => {
    [...nodo.childNodes].forEach(hijo => {
      if (hijo.nodeType === Node.ELEMENT_NODE) {
        // <font color/size> es una etiqueta de presentación obsoleta que
        // SIEMPRE pierde frente a cualquier CSS de la página (aunque en el
        // editor se vea bien, p. ej. el color de párrafo de la pestaña
        // pública Reglas la tapa): se convierte a <span style="..."> antes
        // de seguir, que sí tiene prioridad sobre el CSS del sitio.
        if (hijo.tagName === 'FONT') {
          const span = document.createElement('span');
          const estilos = [];
          if (hijo.hasAttribute('color')) estilos.push(`color: ${hijo.getAttribute('color')}`);
          const tam = TAMANOS_FONT_LEGACY[hijo.getAttribute('size')];
          if (tam) estilos.push(`font-size: ${tam}`);
          if (estilos.length) span.setAttribute('style', estilos.join('; '));
          while (hijo.firstChild) span.appendChild(hijo.firstChild);
          hijo.parentNode.replaceChild(span, hijo);
          limpiar(span);
          return;
        }
        if (!ETIQUETAS_REGLAS_PERMITIDAS.has(hijo.tagName)) {
          // Antes de tirar la etiqueta (p. ej. <a>, <mark>, o los <span
          // class="..."> con los que Word/Google Docs envuelven cada
          // palabra al copiar), si traía color u otro formato permitido en
          // su "style" se conserva envolviendo el contenido en un <span>
          // equivalente — si no, ese formato se perdía sin más al pegar.
          const conservado = hijo.hasAttribute('style') ? filtrarEstiloPermitido(hijo.getAttribute('style')) : '';
          if (conservado) {
            const span = document.createElement('span');
            span.setAttribute('style', conservado);
            while (hijo.firstChild) span.appendChild(hijo.firstChild);
            hijo.parentNode.replaceChild(span, hijo);
            limpiar(span);
            return;
          }
          while (hijo.firstChild) hijo.parentNode.insertBefore(hijo.firstChild, hijo);
          hijo.parentNode.removeChild(hijo);
          return;
        }
        [...hijo.attributes].forEach(attr => {
          const nombre = attr.name.toLowerCase();
          if (nombre === 'style') {
            const limpio = filtrarEstiloPermitido(attr.value);
            if (limpio) hijo.setAttribute('style', limpio); else hijo.removeAttribute('style');
          } else {
            hijo.removeAttribute(attr.name);
          }
        });
        limpiar(hijo);
      } else if (hijo.nodeType !== Node.TEXT_NODE) {
        hijo.parentNode.removeChild(hijo);
      }
    });
  };
  limpiar(contenedor);
  return contenedor.innerHTML;
}

/** HTML con el que se rellena el editor de Reglas al abrir Admin → Liga. */
function contenidoInicialReglas(texto) {
  texto = String(texto || '');
  if (!texto.trim()) return '';
  return pareceHTML(texto) ? sanitizarHTML(texto) : textoAParrafos(texto);
}

/** Pestaña pública «Reglas»: qué es la liga y sus reglas, con el formato que le haya dado el profesor. */
function renderReglas() {
  const texto = String(DATOS.config.reglas_texto || '').trim();
  if (!texto) {
    return `<div class="card aviso"><h2>Todavía no hay reglas publicadas</h2>
      <p class="secundario">El profesor puede escribirlas en Admin → Liga.</p></div>`;
  }
  const html = pareceHTML(texto) ? sanitizarHTML(texto) : textoAParrafos(texto);
  return `<div class="card reglas-texto" style="text-align:left;max-width:760px;margin:0 auto">${html}</div>`;
}

/** Salón de la Fama: una vitrina por insignia activa, agrupadas por periodicidad, con quién la tiene. */
function renderSalonFama() {
  const activas = insigniasActivas();
  if (activas.length === 0) {
    return `<div class="card aviso"><h2>Todavía no hay insignias</h2>
      <p class="secundario">Cuando el profesor cree y reparta insignias, aparecerán aquí.</p></div>`;
  }

  const alumnosPorId = new Map(DATOS.alumnos.filter(activo).map(a => [String(a.id_alumno), a]));
  const jornadasPorId = new Map(DATOS.jornadas.map(j => [String(j.id_jornada), j]));
  const equiposPorId = new Map(DATOS.equipos.map(e => [String(e.id_equipo), e]));

  const grupos = PERIODICIDADES_INSIGNIA
    .map(([valor, etiqueta]) => [etiqueta, activas.filter(i => i.periodicidad === valor)])
    .filter(([, grupo]) => grupo.length > 0);

  return grupos.map(([etiqueta, grupo], i) => `
    <div class="fila-titulo" style="margin-top:${i === 0 ? '0' : '28px'}"><h2>${esc(etiqueta)}</h2></div>
    <div class="grid-insignias">${grupo.map(ins => tarjetaInsigniaFama(ins, alumnosPorId, jornadasPorId, equiposPorId)).join('')}</div>`
  ).join('');
}

function tarjetaInsigniaFama(insignia, alumnosPorId, jornadasPorId, equiposPorId) {
  const ganadores = DATOS.insigniasAlumnos
    .filter(x => String(x.id_insignia) === String(insignia.id_insignia))
    .map(x => ({ alumno: alumnosPorId.get(String(x.id_alumno)), jornada: jornadasPorId.get(String(x.id_jornada)) }))
    .filter(g => g.alumno)
    .sort((a, b) => num(b.jornada && b.jornada.numero_jornada) - num(a.jornada && a.jornada.numero_jornada));

  const imagen = insignia.imagen
    ? `<div class="imagen-fama" style="background-image:url('${esc(insignia.imagen)}')"></div>`
    : `<div class="imagen-fama">${esc(insignia.icono || '🎖️')}</div>`;

  return `<div class="card tarjeta-fama">
    ${imagen}
    <h3>${esc(insignia.nombre)}</h3>
    <p class="secundario">${ganadores.length} ${ganadores.length === 1 ? 'alumno/a' : 'alumnos/as'}</p>
    ${ganadores.length === 0 ? `<p class="nota">Todavía nadie la ha conseguido.</p>` : `
    <ul class="lista-ganadores">
      ${ganadores.map(g => `<li class="avatar-mini-fila">
        ${svgAvatar(g.alumno, equiposPorId.get(String(g.alumno.id_equipo_actual)), 'pequeno')}
        <span><a class="enlace" href="#" data-alumno="${esc(g.alumno.id_alumno)}">${esc(g.alumno.nombre_publico)}</a>${g.jornada ? `<span class="secundario"> · J${esc(g.jornada.numero_jornada)}</span>` : ''}</span>
      </li>`).join('')}
    </ul>`}
  </div>`;
}

function tarjetaLider(etiqueta, icono, principal, secundario, color, idAlumno, idEquipo, extra, lineaExtra, escudoEsquina, avatarHTML) {
  const attr = idAlumno ? ` data-alumno="${esc(idAlumno)}"` : idEquipo ? ` data-equipo="${esc(idEquipo)}"` : '';
  const marca = color ? dot(color) : '';
  return `<div class="card lider"${attr}>
    <div class="etiqueta"><span>${icono}</span>${etiqueta}</div>
    <p class="principal">${marca}${esc(principal)}</p>
    <p class="secundario">${esc(secundario)}</p>
    ${lineaExtra ? `<p class="secundario" style="margin-top:2px">${esc(lineaExtra)}</p>` : ''}
    ${extra ? `<div class="extra-tarjeta"><span class="extra-titulo">${esc(extra.titulo)}</span><p class="extra-texto">${esc(extra.texto)}</p></div>` : ''}
    ${avatarHTML ? `<span style="position:absolute;bottom:12px;right:18px;transform:scale(0.68);transform-origin:bottom right">${avatarHTML}</span>` : ''}
    ${escudoEsquina ? `<span style="position:absolute;z-index:-1;bottom:-10px;right:-70px;transform:rotate(-40deg);transform-origin:bottom right;opacity:0.5;filter:blur(0.15px)">${escudoEsquina}</span>` : ''}
  </div>`;
}

function render() {
  if (VISTA === 'admin') { renderAdmin(); return; }
  const main = $('#main');
  if (!CURSO_SEL && !configActivo(DATOS.config.mostrar_todos_cursos)) {
    const cursos = cursosActivos(DATOS);
    if (cursos.length > 0) CURSO_SEL = cursos[0].id_curso;
  }
  const ind = clasIndividual(DATOS, TRIMESTRE, GRUPO_SEL, CURSO_SEL);
  const eq = clasEquipos(DATOS, TRIMESTRE, CURSO_SEL);
  const tendAl = configActivo(DATOS.config.mostrar_tendencia_alumnos) ? tendencias(DATOS, TRIMESTRE, ind, 'individual', GRUPO_SEL, CURSO_SEL) : null;
  const tendEq = configActivo(DATOS.config.mostrar_tendencia_equipos) ? tendencias(DATOS, TRIMESTRE, eq, 'equipos', CURSO_SEL) : null;

  let html = '';
  if (VISTA === 'alumno') {
    html = renderAlumno(ALUMNO_SEL);
  } else if (VISTA === 'equipo') {
    html = renderEquipo(EQUIPO_SEL);
  } else if (VISTA === 'dashboard') {
    const liderEq = eq.find(e => e.registros > 0);
    const liderAl = ind.find(a => a.jornadas > 0);
    const alumnoLider = liderAl ? DATOS.alumnos.find(a => String(a.id_alumno) === String(liderAl.id)) : null;
    const avatarLiderHTML = alumnoLider ? svgAvatar(alumnoLider, { color: liderAl.color }, 'grande') : '';
    const escudoLiderHTML = liderEq ? escudoEsquinaHTML(liderEq, 230) : '';
    const idActual = String(DATOS.config.jornada_actual || '');
    const jAct = jornadaActual(DATOS, idActual, CURSO_SEL, GRUPO_SEL);

    html = `
      <div class="fila-titulo"><h2>Marcador de la liga</h2>${pills()}</div>
      ${pillsCursos() ? `<div style="margin-bottom:${pillsGrupos(CURSO_SEL) ? '10px' : '20px'}">${pillsCursos()}</div>` : ''}
      ${pillsGrupos(CURSO_SEL) ? `<div style="margin-bottom:20px">${pillsGrupos(CURSO_SEL)}</div>` : ''}
      <div class="grid3">
        ${tarjetaLider('Equipo líder', '🛡️', liderEq ? liderEq.equipo : '—',
          liderEq ? `${fmtMedia(liderEq.media)} de media · ${liderEq.puntos} pts` : 'Sin datos', liderEq && liderEq.color, null, liderEq ? liderEq.id : null, null, null, escudoLiderHTML)}
        ${tarjetaLider('Alumno/a líder', '🏆', liderAl ? liderAl.nombre : '—',
          liderAl ? `${liderAl.puntos} pts · media ${fmtMedia(liderAl.media)}` : 'Sin datos', null, liderAl ? liderAl.id : null, null, null, null, null, avatarLiderHTML)}
        ${tarjetaLider('Jornada actual', '⚽', jAct ? `J${jAct.numero_jornada}` : '—',
          jAct ? (jAct.titulo || 'Jornada') : 'Sin jornadas publicadas',
          null, null, null,
          jAct && jAct.tareas ? { titulo: 'Tareas', texto: jAct.tareas } : null,
          jAct && jAct.fecha ? fmtFecha(jAct.fecha) : null)}
      </div>
      <div class="grid2">
        <div class="card tabla-scroll"><a class="vermas" href="#" data-ir="equipos">Ver completa →</a><h3>Clasificación por equipos</h3>${tablaEquipos(eq, true, tendEq)}</div>
        <div class="card tabla-scroll"><a class="vermas" href="#" data-ir="individual">Ver completa →</a><h3>Top individual</h3>${tablaIndividual(ind.slice(0, 8), true, tendAl)}</div>
      </div>`;
  } else if (VISTA === 'individual') {
    html = `<div class="fila-titulo"><h2>Clasificación individual</h2>${pills()}</div>
      ${pillsCursos() ? `<div style="margin-bottom:${pillsGrupos(CURSO_SEL) ? '10px' : '20px'}">${pillsCursos()}</div>` : ''}
      ${pillsGrupos(CURSO_SEL) ? `<div style="margin-bottom:20px">${pillsGrupos(CURSO_SEL)}</div>` : ''}
      ${renderPodio(ind, 'individual')}
      <div class="card tabla-scroll">${tablaIndividual(ind, false, tendAl)}</div>`;
  } else if (VISTA === 'jornadas') {
    html = `<div class="fila-titulo"><h2>Jornadas</h2>${pills()}</div>
      ${pillsCursos() ? `<div style="margin-bottom:${pillsGrupos(CURSO_SEL) ? '10px' : '20px'}">${pillsCursos()}</div>` : ''}
      ${pillsGrupos(CURSO_SEL) ? `<div style="margin-bottom:20px">${pillsGrupos(CURSO_SEL)}</div>` : ''}
      ${listaJornadas(DATOS.jornadas, TRIMESTRE, CURSO_SEL, GRUPO_SEL)}`;
  } else if (VISTA === 'salon') {
    html = `<div class="fila-titulo"><h2>Salón de la Fama</h2></div>
      ${renderSalonFama()}`;
  } else if (VISTA === 'reglas') {
    html = `<div class="fila-titulo"><h2>Reglas</h2></div>
      ${renderReglas()}`;
  } else {
    html = `<div class="fila-titulo"><h2>Clasificación por equipos</h2>${pills()}</div>
      ${pillsCursos() ? `<div style="margin-bottom:20px">${pillsCursos()}</div>` : ''}
      ${renderPodio(eq, 'equipos')}
      <div class="card"><div class="tabla-scroll">${tablaEquipos(eq, false, tendEq)}</div>
      <p class="nota">Orden principal: media de puntos por alumno y jornada (solo jornadas publicadas). Equilibrio:
      desviación entre las medias de los integrantes con jornadas puntuadas — cuanto más bajo, más parejo el equipo.</p></div>`;
  }
  main.innerHTML = html;

  main.querySelectorAll('[data-tri]').forEach(b =>
    b.addEventListener('click', () => { TRIMESTRE = b.dataset.tri; render(); }));
  main.querySelectorAll('[data-periodo]').forEach(b =>
    b.addEventListener('click', () => { DIANA_PERIODO = b.dataset.periodo; render(); }));
  main.querySelectorAll('[data-curso]').forEach(b =>
    b.addEventListener('click', () => { CURSO_SEL = b.dataset.curso; GRUPO_SEL = ''; render(); }));
  main.querySelectorAll('[data-grupo]').forEach(b =>
    b.addEventListener('click', () => { GRUPO_SEL = b.dataset.grupo; render(); }));
  main.querySelectorAll('[data-ir]').forEach(a =>
    a.addEventListener('click', e => { e.preventDefault(); cambiarVista(a.dataset.ir); }));
  main.querySelectorAll('[data-alumno]').forEach(el =>
    el.addEventListener('click', e => { e.preventDefault(); abrirAlumno(el.dataset.alumno); }));
  main.querySelectorAll('[data-equipo]').forEach(el =>
    el.addEventListener('click', e => { e.preventDefault(); abrirEquipo(el.dataset.equipo); }));
  $('#repetir-tour').hidden = VISTA !== 'dashboard';
  wireTooltips(main);
}

function cambiarVista(v) {
  VISTA = v;
  document.querySelectorAll('#nav button').forEach(b => b.classList.toggle('on', b.dataset.vista === v));
  render();
  cerrarMenu();
}

document.querySelectorAll('#nav button').forEach(b =>
  b.addEventListener('click', () => cambiarVista(b.dataset.vista)));

const tituloEl = $('#titulo');
if (tituloEl) tituloEl.addEventListener('click', () => cambiarVista('dashboard'));

$('#repetir-tour').addEventListener('click', repetirTour);

// Al bloquear la pantalla o salir del navegador (cambiar de app, minimizar...)
// el móvil dispara "visibilitychange" con document.hidden a true: se para la
// música de bienvenida si estaba sonando, en vez de dejarla de fondo sin que
// se vea la pestaña. No se reanuda sola al volver (los navegadores tampoco
// lo dejarían sin un gesto directo del usuario); hay que volver a pulsar el

const menuBtn = $('#menu-btn');

function abrirMenu() {
  navEl.classList.add('nav-abierto');
  menuOverlay.classList.add('on');
  menuBtn.setAttribute('aria-expanded', 'true');
  document.body.style.overflow = 'hidden';
}
function cerrarMenu() {
  navEl.classList.remove('nav-abierto');
  menuOverlay.classList.remove('on');
  menuBtn.setAttribute('aria-expanded', 'false');
  document.body.style.overflow = '';
}
menuBtn.addEventListener('click', () => {
  if (navEl.classList.contains('nav-abierto')) cerrarMenu(); else abrirMenu();
});
menuOverlay.addEventListener('click', cerrarMenu);

let TOUR_PASO = 0;

/** Se llama justo al terminar de ocultarse la bienvenida (con o sin ella activada). */
function mostrarTourSiToca() {
  if (!configActivo(DATOS.config.tour_activo, true)) return;
  if (localStorage.getItem(TOUR_VISTO_CLAVE)) return;
  if (VISTA !== 'dashboard') return; // por si el enlace de entrada llevaba a otra pestaña
  TOUR_PASO = 0;
  renderTour();
  $('#tour').hidden = false;
}

function cerrarTour() {
  localStorage.setItem(TOUR_VISTO_CLAVE, '1');
  $('#tour').hidden = true;
}

/** Botón «Repetir tour» del Dashboard: lo abre siempre, pase lo que pase con el ajuste o con localStorage. */
function repetirTour() {
  TOUR_PASO = 0;
  renderTour();
  $('#tour').hidden = false;
}

function renderTour() {
  const paso = TOUR_PASOS[TOUR_PASO];
  const esUltimo = TOUR_PASO === TOUR_PASOS.length - 1;
  $('#tour-cuerpo').innerHTML = `
    <div class="tour-dots">${TOUR_PASOS.map((_, i) => `<span class="${i === TOUR_PASO ? 'on' : ''}"></span>`).join('')}</div>
    <h3>${esc(paso.titulo)}</h3>
    <p>${esc(paso.texto)}</p>
    <div class="admin-barra" style="margin-top:22px;justify-content:space-between">
      <button class="btn-borde btn-mini" id="tour-saltar">Saltar</button>
      <div style="display:flex;gap:8px">
        ${TOUR_PASO > 0 ? `<button class="btn-borde" id="tour-atras">← Atrás</button>` : ''}
        <button class="btn-oro" id="tour-siguiente">${esUltimo ? 'Empezar' : 'Siguiente →'}</button>
      </div>
    </div>`;
  $('#tour-saltar').addEventListener('click', cerrarTour);
  const btnAtras = $('#tour-atras');
  if (btnAtras) btnAtras.addEventListener('click', () => { TOUR_PASO--; renderTour(); });
  $('#tour-siguiente').addEventListener('click', () => {
    if (esUltimo) { cerrarTour(); return; }
    TOUR_PASO++;
    renderTour();
  });
}

$('#tour-cerrar').addEventListener('click', cerrarTour);
$('#tour').addEventListener('click', e => { if (e.target.id === 'tour') cerrarTour(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape' && !$('#tour').hidden) cerrarTour(); });

/** Aviso flotante y breve para errores de audio que si no se verían (la consola no la mira nadie). */
function avisarErrorAudio(mensaje) {
  const existente = document.querySelector('.toast-audio');
  if (existente) existente.remove();
  const toast = document.createElement('div');
  toast.className = 'toast-audio';
  toast.textContent = mensaje;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 7000);
}

/**
 * La pantalla de bienvenida es lo primero que se ve (ya está en el HTML
 * desde el principio, con el botón «Cargando…» deshabilitado, mientras se
 * leen los datos de la hoja). Esta función se llama en cuanto terminan de
 * cargarse: si la bienvenida está activada, rellena el nombre de la liga y
 * activa el botón «Entrar» (el gesto que exigen los navegadores para poder
 * reproducir audio); si no lo está, se retira ella sola sin esperar a nada.
 */
function finalizarSplash(activa) {
  if (!activa) { ocultarSplash(); return; }

  const nombre = DATOS.config.nombre_liga || 'Liga Armónica';
  $('#splash-nombre').textContent = nombre;

  const musicaBtn = $('#musica-btn');
  const audio = $('#splash-audio');
  const url = String(DATOS.config.bienvenida_musica_url || '').trim();
  const musicaActiva = configActivo(DATOS.config.bienvenida_musica_activa, true);

  audio.addEventListener('error', () => {
    const codigo = audio.error ? audio.error.code : null;
    console.warn('Error al cargar el audio de bienvenida (code ' + codigo + '):', url);
    avisarErrorAudio('No se pudo cargar el audio de bienvenida (código ' + codigo + '). Prueba a abrir la URL directamente en una pestaña nueva.');
  });

  const boton = $('#splash-entrar');
  boton.disabled = false;
  boton.textContent = 'Entrar';

  const entrar = () => {
    boton.disabled = true;
    // Al pulsar «Entrar» arrancan a la vez la animación de las líneas del
    // pentagrama (hasta ahora quietas) y la música; se espera a que la
    // animación termine y un poco más antes de entrar en la pantalla
    // principal, para que la bienvenida se vea y se oiga completa.
    $('#splash').classList.add('animar');

    if (url && musicaActiva) {
      audio.src = url;
      audio.volume = 0.6;
      audio.play().then(() => { musicaBtn.hidden = false; })
        .catch(err => {
          console.warn('No se pudo reproducir la música de bienvenida:', err);
          avisarErrorAudio('No se pudo reproducir la música de bienvenida (' + err.name + ').');
        });
    }

    const sinAnimacion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const duracionAnimacion = sinAnimacion ? 0 : 2700; // 0.5s de retraso máximo + 2.2s de duración
    const pausaExtra = 900;
    setTimeout(ocultarSplash, duracionAnimacion + pausaExtra);
  };
  boton.addEventListener('click', entrar, { once: true });

  musicaBtn.addEventListener('click', () => {
    if (audio.paused) { audio.play().catch(() => {}); musicaBtn.textContent = '🔊'; }
    else { audio.pause(); musicaBtn.textContent = '🔇'; }
  });
}

// el viento-metal, madera para cuerda/madera, plateado para flauta/canto...),
// para que cada icono se distinga también por color y no solo por forma.
const COLORES_INSTRUMENTO = {
  'Piano': 'e8e4d8',
  'Violín': 'a05a2c',
  'Viola': '8b4a24',
  'Violonchelo': '73391a',

function colorInstrumentoHex(instrumento) {
  return COLORES_INSTRUMENTO[instrumento] || COLORES_INSTRUMENTO['Otro'];
}

function urlIconoInstrumento(instrumento, colorHex = null) {
  const id = ICONOS_INSTRUMENTO[instrumento] || ICONOS_INSTRUMENTO['Otro'];
  const [prefix, nombre] = id.split(':');
  if (INSTRUMENTOS_ICONO_MULTICOLOR.has(instrumento) && !colorHex) {
    return `https://api.iconify.design/${prefix}/${nombre}.svg`;
  }
  const color = colorHex || colorInstrumentoHex(instrumento);
  return `https://api.iconify.design/${prefix}/${nombre}.svg?color=%23${color}`;
}

/** Icono del instrumento como <img>, listo para insertar junto a texto o dentro de una insignia. */
function iconoInstrumento(instrumento, tamano = 18, colorHex = null) {
  return `<img src="${esc(urlIconoInstrumento(instrumento, colorHex))}" width="${tamano}" height="${tamano}" alt="" style="vertical-align:-${Math.round(tamano * 0.2)}px" />`;
}

function colorPeloHex(valor) {
  const par = COLORES_PELO.find(([v]) => v === valor);
  return (par ? par[2] : COLORES_PELO[0][2]);
}

// La API pública de DiceBear (api.dicebear.com) ignora silenciosamente las
// opciones de peinado/expresión (comprobado a mano: mismo resultado para
// valores distintos), así que la librería se carga como módulo directamente
// en el navegador y se genera el SVG en local — así si funciona de verdad.
let DB_createAvatar = null;
let DB_micah = null;

async function cargarDicebear() {
  try {
    const [core, micah] = await Promise.all([
      import('https://esm.sh/@dicebear/core@9.4.2'),
      import('https://esm.sh/@dicebear/micah@9.4.2'),
    ]);
    DB_createAvatar = core.createAvatar;
    DB_micah = micah;
  } catch (err) {
    console.error('No se pudo cargar la librería de avatares (DiceBear); se mostrará un marco liso.', err);
  }
}

/** Un único peinado fijo por género (comprobado visualmente: "full" = largo, "fonze" = corto). */
const PEINADO_POR_GENERO = { 'Masculino': 'fonze', 'Femenino': 'full' };
const peinadoDe = genero => PEINADO_POR_GENERO[genero] || 'fonze';

/**
 * Avatar del alumno: retrato DiceBear (estilo "micah") recortado en círculo,
 * con marco del color del equipo y el icono del instrumento superpuesto en
 * una esquina. Mismo alumno → mismo dibujo siempre (semilla = id_alumno);
 * mismo peinado y sonrisa fijos para todos según género, color de pelo
 * elegido, y color de camiseta (propio o el del equipo).
 * `tamano`: 'grande' (ficha) o 'pequeno' (miniatura, sin icono de instrumento).
 */
function svgAvatar(alumno, equipo, tamano = 'grande') {
  const grande = tamano === 'grande';
  const colorEquipo = (equipo && equipo.color) || '#5c6b73';
  const colorCamiseta = alumno.color_camiseta || colorEquipo;
  const claseTam = grande ? 'avatar-grande' : 'avatar-pequeno';

  const retrato = (DB_createAvatar && DB_micah) ? DB_createAvatar(DB_micah, {
    seed: String(alumno.id_alumno || 'alumno'),
    backgroundColor: [String(colorEquipo).replace('#', '')],
    shirtColor: [String(colorCamiseta).replace('#', '')],
    hairColor: [colorPeloHex(alumno.color_pelo)],
    hair: [peinadoDe(alumno.genero)],
    mouth: ['smile'],
    facialHairProbability: 0,
    glassesProbability: 0,
    earringsProbability: 0,
  }).toString() : '';

  // El tamaño del recuadro, el borde y la insignia del instrumento se
  // controlan por CSS (según la clase avatar-grande/avatar-pequeno) para que
  // puedan encogerse juntos y en proporción en la versión móvil; aquí solo
  // se fija el tamaño "de referencia" del icono, que luego el CSS reescala
  // al 60% de la insignia sea cual sea su tamaño real en pantalla.
  const badge = grande ? `
    <span class="avatar-instrumento" style="border-color:${esc(colorEquipo)}">${iconoInstrumento(alumno.instrumento, 34)}</span>` : '';

  return `<span class="avatar-alumno ${claseTam}">
    <span class="avatar-retrato" style="border-color:${esc(colorEquipo)}">${retrato}</span>
    ${badge}
  </span>`;
}

async function postScript(action, payload = {}) {
  // Cuerpo como texto plano (sin cabecera Content-Type) para evitar el
  // preflight de CORS, que Apps Script no gestiona. No lo "arregles".
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ action, token: ADMIN.token, ...payload }),
  });
  if (!res.ok) throw new Error(`Error de red (HTTP ${res.status}).`);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'Operación rechazada.');
  return data;
}
