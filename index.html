   2) SCRIPT_URL: la URL de tu Apps Script de escritura (termina en /exec).
      Solo hace falta para la pestaña Admin; las vistas públicas funcionan
      sin ella. Instrucciones de instalación en Code-escritura.gs.
*/
const SPREADSHEET_ID = '1dnKir-osb8z4sqnMEqjUeA-GLYM45KVW1ip_sv8uBRg';

  .form-grid { display: grid; gap: 12px 16px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }

<div class="wrap">
  <header>
    <div class="temporada" id="temporada" hidden><small>Temporada</small><strong id="curso"></strong></div>
    <p class="eyebrow">Conservatorio · Armonía</p>
    <h1 id="titulo">Liga Armónica</h1>
    <nav id="nav">
      <button data-vista="dashboard" class="on">Dashboard</button>
      <button data-vista="individual">Individual</button>
      <button data-vista="equipos">Equipos</button>
      <button data-vista="admin">Admin</button>
    </nav>
  </header>
  <main id="main">
    <div class="spinner"></div>
    <p class="cargando">Cargando la liga…</p>
  </main>
  <footer id="pie">Liga Armónica · Gamificación de la asignatura de Armonía</footer>
</div>

<script>
/* =========================================================================
   Lectura de Google Sheets (endpoint gviz de hojas compartidas en lectura)
   ========================================================================= */

async function leerPestana(nombre) {
  const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&headers=1&sheet=${encodeURIComponent(nombre)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`No se pudo leer la pestaña ${nombre} (HTTP ${res.status}).`);
  const texto = await res.text();
  // La respuesta viene envuelta en google.visualization.Query.setResponse(...)
  const ini = texto.indexOf('(');
  const fin = texto.lastIndexOf(')');
  if (ini === -1 || fin === -1) throw new Error(`Respuesta inesperada al leer ${nombre}. ¿Está la hoja compartida como "Cualquier persona con el enlace: Lector"?`);
  const json = JSON.parse(texto.slice(ini + 1, fin));
  if (json.status === 'error') {
    throw new Error(`Google Sheets devolvió un error al leer ${nombre}: ${(json.errors || []).map(e => e.detailed_message || e.message).join('; ')}`);
  }
  const etiquetas = json.table.cols.map(c => String(c.label || '').trim());
  return json.table.rows.map(fila => {
    const obj = {};
    etiquetas.forEach((et, i) => {
      if (!et) return;
      const celda = fila.c && fila.c[i];
      let v = celda ? celda.v : null;
      if (v === null || v === undefined) v = '';
      else if (typeof v === 'boolean') v = v ? 'TRUE' : 'FALSE';
      else if (typeof v === 'string' && v.startsWith('Date(')) v = (celda.f || v); // fechas: usar el formato visible
      obj[et] = v;
    });
    return obj;
  }).filter(obj => Object.values(obj).some(v => v !== ''));
}

async function cargarDatos() {
  const [configFilas, alumnos, equipos, jornadas, registros] = await Promise.all([
    leerPestana('CONFIG'), leerPestana('ALUMNOS'), leerPestana('EQUIPOS'),
    leerPestana('JORNADAS'), leerPestana('REGISTROS'),
  ]);
  const config = {};
  configFilas.forEach(f => { config[String(f.clave)] = f.valor; });
  return { config, alumnos, equipos, jornadas, registros };
}

/* =========================================================================
   Clasificaciones (solo jornadas con estado_publicacion = publicada)
   ========================================================================= */

const num = v => { const n = Number(v); return Number.isFinite(n) ? n : 0; };
const activo = x => String(x.activo).toUpperCase() !== 'FALSE' && String(x.activo) !== '0';
const fmtMedia = n => n.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

function jornadasPublicadas(jornadas, trimestre) {
  return jornadas.filter(j => {
    if (String(j.estado_publicacion).toLowerCase() !== 'publicada') return false;
    return trimestre === 'curso' || String(j.trimestre) === String(trimestre);
  });
}

function registrosValidos(datos, trimestre) {
  const ids = new Set(jornadasPublicadas(datos.jornadas, trimestre).map(j => String(j.id_jornada)));
  return datos.registros.filter(r => ids.has(String(r.id_jornada)));
}

function clasIndividual(datos, trimestre) {
  const acc = new Map();
  for (const r of registrosValidos(datos, trimestre)) {
    const id = String(r.id_alumno);
    if (!acc.has(id)) acc.set(id, { puntos: 0, jornadas: 0 });
    const a = acc.get(id); a.puntos += num(r.total); a.jornadas += 1;
  }
  const eqById = new Map(datos.equipos.map(e => [String(e.id_equipo), e]));
  const filas = datos.alumnos.filter(activo).map(a => {
    const s = acc.get(String(a.id_alumno)) || { puntos: 0, jornadas: 0 };
    const eq = eqById.get(String(a.id_equipo_actual));
    return {
      nombre: a.nombre_publico || '—',
      equipo: eq ? eq.nombre_equipo : '—',
      color: eq ? eq.color : null,
      puntos: s.puntos, jornadas: s.jornadas,
      media: s.jornadas > 0 ? s.puntos / s.jornadas : 0,
    };
  });
  filas.sort((a, b) => b.puntos - a.puntos || b.media - a.media || a.nombre.localeCompare(b.nombre, 'es'));
  filas.forEach((f, i) => f.pos = i + 1);
  return filas;
}

function clasEquipos(datos, trimestre) {
  const acc = new Map();
  for (const r of registrosValidos(datos, trimestre)) {
    const id = String(r.id_equipo_en_jornada);
    if (!id) continue;
    if (!acc.has(id)) acc.set(id, { puntos: 0, registros: 0 });
    const e = acc.get(id); e.puntos += num(r.total); e.registros += 1;
  }
  const filas = datos.equipos.filter(activo).map(e => {
    const s = acc.get(String(e.id_equipo)) || { puntos: 0, registros: 0 };
    const n = datos.alumnos.filter(a => activo(a) && String(a.id_equipo_actual) === String(e.id_equipo)).length;
    return {
      equipo: e.nombre_equipo, color: e.color,
      puntos: s.puntos, registros: s.registros, alumnos: n,
      media: s.registros > 0 ? s.puntos / s.registros : 0,
    };
  });
  filas.sort((a, b) => b.media - a.media || b.puntos - a.puntos || a.equipo.localeCompare(b.equipo, 'es'));
  filas.forEach((f, i) => f.pos = i + 1);
  return filas;
}

/* =========================================================================
   Interfaz
   ========================================================================= */

const $ = s => document.querySelector(s);
const esc = t => String(t).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

let DATOS = null;
let VISTA = 'dashboard';
let TRIMESTRE = '1';

const TRIMESTRES = [['1','1.º trimestre'],['2','2.º trimestre'],['3','3.º trimestre'],['curso','Curso completo']];

function badgePos(p) {
  const cls = p === 1 ? 'p1' : p === 2 ? 'p2' : p === 3 ? 'p3' : '';
  return `<span class="pos ${cls}">${p}</span>`;
}
const dot = c => `<span class="dot" style="background:${esc(c || '#666')}"></span>`;

function pills() {
  return `<div class="pills">${TRIMESTRES.map(([v, l]) =>
    `<button data-tri="${v}" class="${TRIMESTRE === v ? 'on' : ''}">${l}</button>`).join('')}</div>`;
}

function tablaIndividual(filas, compacta) {
  if (!filas.some(f => f.jornadas > 0) && filas.length === 0) filas = [];
  if (filas.length === 0) return `<p class="nota">Todavía no hay registros publicados en este trimestre.</p>`;
  return `<table><thead><tr>
      <th>Pos</th><th>Alumno/a</th><th>Equipo</th><th class="num">Puntos</th>
      ${compacta ? '' : '<th class="num">Media</th><th class="num">Jornadas</th>'}
    </tr></thead><tbody>${filas.map(f => `
    <tr class="${f.pos <= 3 ? 'podio' : ''}">
      <td>${badgePos(f.pos)}</td>
      <td><strong>${esc(f.nombre)}</strong></td>
      <td>${dot(f.color)}${esc(f.equipo)}</td>
      <td class="num pts">${f.puntos}</td>
      ${compacta ? '' : `<td class="num">${fmtMedia(f.media)}</td><td class="num" style="color:var(--muted)">${f.jornadas}</td>`}
    </tr>`).join('')}</tbody></table>`;
}

function tablaEquipos(filas, compacta) {
  if (filas.length === 0) return `<p class="nota">Todavía no hay registros publicados en este trimestre.</p>`;
  return `<table><thead><tr>
      <th>Pos</th><th>Equipo</th><th class="num">Media</th><th class="num">Puntos</th>
      ${compacta ? '' : '<th class="num">Alumnos</th>'}
    </tr></thead><tbody>${filas.map(f => `
    <tr class="${f.pos === 1 ? 'podio' : ''}">
      <td>${badgePos(f.pos)}</td>
      <td><strong>${dot(f.color)}${esc(f.equipo)}</strong></td>
      <td class="num pts">${fmtMedia(f.media)}</td>
      <td class="num">${f.puntos}</td>
      ${compacta ? '' : `<td class="num" style="color:var(--muted)">${f.alumnos}</td>`}
    </tr>`).join('')}</tbody></table>`;
}

function tarjetaLider(etiqueta, icono, principal, secundario, color) {
  return `<div class="card lider">
    <div class="etiqueta"><span>${icono}</span>${etiqueta}</div>
    <p class="principal">${color ? dot(color) : ''}${esc(principal)}</p>
    <p class="secundario">${esc(secundario)}</p>
  </div>`;
}

function render() {
  if (VISTA === 'admin') { renderAdmin(); return; }
  const main = $('#main');
  const ind = clasIndividual(DATOS, TRIMESTRE);
  const eq = clasEquipos(DATOS, TRIMESTRE);

  let html = '';
  if (VISTA === 'dashboard') {
    const liderEq = eq.find(e => e.registros > 0);
    const liderAl = ind.find(a => a.jornadas > 0);
    const pubs = jornadasPublicadas(DATOS.jornadas, TRIMESTRE);
    const idActual = String(DATOS.config.jornada_actual || '');
    const jAct = DATOS.jornadas.find(j => String(j.id_jornada) === idActual) || pubs[pubs.length - 1];

    html = `
      <div class="fila-titulo"><h2>Marcador de la liga</h2>${pills()}</div>
      <div class="grid3">
        ${tarjetaLider('Equipo líder', '🛡️', liderEq ? liderEq.equipo : '—',
          liderEq ? `${fmtMedia(liderEq.media)} de media · ${liderEq.puntos} pts` : 'Sin datos', liderEq && liderEq.color)}
        ${tarjetaLider('Alumno/a líder', '🏆', liderAl ? liderAl.nombre : '—',
          liderAl ? `${liderAl.puntos} pts · media ${fmtMedia(liderAl.media)}` : 'Sin datos')}
        ${tarjetaLider('Jornada actual', '⚽', jAct ? `J${jAct.numero_jornada}` : '—',
          jAct ? `${jAct.titulo || 'Jornada'}${jAct.fecha ? ' · ' + jAct.fecha : ''}` : 'Sin jornadas publicadas')}
      </div>
      <div class="grid2">

/* =========================================================================
   Panel de administración (escritura vía Apps Script)
   Secciones: Puntuar · Jornadas · Alumnos · Equipos · Liga
   ========================================================================= */

const ESTADOS_ENTREGA = ['En plazo', 'Justificado', 'Fuera de plazo', 'No entregado'];
const GENEROS = ['Masculino', 'Femenino', 'No especificado'];
const INSTRUMENTOS = ['Piano', 'Violín', 'Viola', 'Violonchelo', 'Contrabajo', 'Flauta',
  'Oboe', 'Clarinete', 'Fagot', 'Saxofón', 'Trompeta', 'Trompa', 'Trombón', 'Tuba',
  'Guitarra', 'Percusión', 'Canto', 'Otro'];

const ADMIN = {
  token: sessionStorage.getItem('liga_admin_token') || '',
  seccion: 'puntuar',
  jornadaSel: '',
  filas: {},          // id_alumno -> valores editables de la jornada
  editJornada: null,  // id en edición (null = crear nueva)
  editAlumno: null,
  editEquipo: null,
  ocupado: false,
};

async function postScript(action, payload = {}) {
  // Cuerpo como texto plano (sin cabecera Content-Type) para evitar el
  // preflight de CORS, que Apps Script no gestiona. No lo "arregles".
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ action, token: ADMIN.token, ...payload }),
  });
  if (!res.ok) throw new Error(`Error de red (HTTP ${res.status}).`);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'Operación rechazada.');
  return data;
}

const alumnosActivos = () => DATOS.alumnos.filter(activo);
const valorDe = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
const marcado = id => { const el = document.getElementById(id); return el ? el.checked : true; };

function totalLocal(f) {
  if (f.estado_entrega === 'No entregado') return 0;
  const cal = f.calidad === '' ? 0 : Number(f.calidad) || 0;
  return Math.min(7, cal + (Number(f.entrega) || 0) + (Number(f.correccion) || 0));
}

function prepararFilas() {
  const existentes = new Map(
    DATOS.registros
      .filter(r => String(r.id_jornada) === String(ADMIN.jornadaSel))
      .map(r => [String(r.id_alumno), r])
  );
  ADMIN.filas = {};
  for (const a of alumnosActivos()) {
    const r = existentes.get(String(a.id_alumno));
    ADMIN.filas[a.id_alumno] = r ? {
      estado_entrega: r.estado_entrega || 'En plazo',
      calidad: (r.calidad === '' || r.calidad == null) ? '' : String(r.calidad),
      entrega: String(num(r.entrega_puntualidad)),
      correccion: String(num(r.correccion)),
      racha: (r.racha_manual === '' || r.racha_manual == null) ? '' : String(r.racha_manual),
    } : { estado_entrega: 'En plazo', calidad: '', entrega: '0', correccion: '0', racha: '' };
  }
}

/* ---------- Render principal del panel ---------- */

function renderAdmin(mensaje = '', esError = false) {
  const main = $('#main');

  if (!SCRIPT_URL || SCRIPT_URL.startsWith('PEGA_AQUI')) {
    main.innerHTML = `<div class="aviso card"><h2>Falta el script de escritura</h2>
      <p>Las vistas públicas ya funcionan. Para gestionar la liga desde la web, instala el
      script <code>Code-escritura.gs</code> en tu hoja (Extensiones → Apps Script), define
      <code>ADMIN_TOKEN</code> en Propiedades del script, impleméntalo como aplicación web
      y pega la URL en la constante <code>SCRIPT_URL</code> de este <code>index.html</code>.</p></div>`;
    return;
  }
  if (!DATOS) {
    main.innerHTML = `<div class="aviso card"><h2>Sin datos</h2>
      <p>No se han podido cargar los datos de la hoja. Recarga la página.</p></div>`;
    return;
  }

  // --- Acceso ---
  if (!ADMIN.token) {
    main.innerHTML = `<div class="card login-caja">
      <h2 style="color:var(--gold)">Zona técnica</h2>
      <p class="secundario">Introduce el token de administrador. Se comprueba en el servidor
      y solo se guarda en esta pestaña del navegador.</p>
      <input type="password" id="token-input" placeholder="Token de administrador" autocomplete="off" />
      <button class="btn-oro" id="token-btn">Entrar</button>
      <p id="token-msg" class="msg-error" style="margin-top:10px"></p>
    </div>`;
    const input = $('#token-input');
    const entrar = async () => {
      const t = input.value.trim();
      if (!t) return;
      $('#token-btn').disabled = true;
      try {
        ADMIN.token = t;
        await postScript('verifyToken');
        sessionStorage.setItem('liga_admin_token', t);
        renderAdmin();
      } catch (err) {
        ADMIN.token = '';
        $('#token-msg').textContent = err.message;
        $('#token-btn').disabled = false;
      }
    };
    $('#token-btn').addEventListener('click', entrar);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') entrar(); });
    input.focus();
    return;
  }

  // --- Estructura común: cabecera + subnavegación + sección ---
  const SECCIONES = [
    ['puntuar', 'Puntuar'], ['jornadas', 'Jornadas'], ['alumnos', 'Alumnos'],
    ['equipos', 'Equipos'], ['liga', 'Liga'],
  ];
  const subnav = `<div class="pills" style="margin-bottom:16px">
    ${SECCIONES.map(([v, l]) =>
      `<button data-seccion="${v}" class="${ADMIN.seccion === v ? 'on' : ''}">${l}</button>`).join('')}
  </div>`;

  const cuerpo =
    ADMIN.seccion === 'jornadas' ? seccionJornadas() :
    ADMIN.seccion === 'alumnos' ? seccionAlumnos() :
    ADMIN.seccion === 'equipos' ? seccionEquipos() :
    ADMIN.seccion === 'liga' ? seccionLiga() :
    seccionPuntuar();

  main.innerHTML = `
    <div class="fila-titulo">
      <h2 style="color:var(--gold)">Zona técnica</h2>
      <button class="btn-borde" id="salir-btn">Salir</button>
    </div>
    ${subnav}
    <p id="admin-aviso" class="${esError ? 'msg-error' : 'msg-ok'}" style="margin:0 0 12px">${esc(mensaje)}</p>
    ${cuerpo}`;

  $('#salir-btn').addEventListener('click', () => {
    sessionStorage.removeItem('liga_admin_token');
    ADMIN.token = '';
    renderAdmin();
  });
  main.querySelectorAll('[data-seccion]').forEach(b =>
    b.addEventListener('click', () => { ADMIN.seccion = b.dataset.seccion; renderAdmin(); }));

  if (ADMIN.seccion === 'puntuar') wirePuntuar();
  else if (ADMIN.seccion === 'jornadas') wireJornadas();
  else if (ADMIN.seccion === 'alumnos') wireAlumnos();
  else if (ADMIN.seccion === 'equipos') wireEquipos();
  else if (ADMIN.seccion === 'liga') wireLiga();
}

/** Envuelve un guardado: deshabilita el botón, ejecuta y muestra el resultado. */
async function operar(boton, fn, okMsg) {
  if (ADMIN.ocupado) return;
  ADMIN.ocupado = true;
  if (boton) boton.disabled = true;
  try {
    const msg = await fn();
    ADMIN.ocupado = false;
    renderAdmin(msg || okMsg || 'Guardado.');
  } catch (err) {
    ADMIN.ocupado = false;
    renderAdmin(err.message, true);
  }
}

/* ---------- Sección: Puntuar ---------- */

function seccionPuntuar() {
  if (DATOS.jornadas.length === 0) {
    return `<div class="card"><p class="nota">Todavía no hay jornadas. Crea la primera en la
      pestaña <strong>Jornadas</strong>.</p></div>`;

        <select id="jornada-sel">

    </div>

      ${alumnosActivos().length === 0 ? `<p class="nota">No hay alumnos activos. Créalos en la pestaña <strong>Alumnos</strong>.</p>` : `
      <table class="tabla-admin">
        <thead><tr>

        </tr></thead>
        <tbody>

      La vista para otros visitantes tarda unos minutos en refrescarse.</p>`}

function wirePuntuar() {
  const sel = $('#jornada-sel');
  if (!sel) return;
  sel.addEventListener('change', e => {
    ADMIN.jornadaSel = e.target.value;
    prepararFilas();
    renderAdmin();
  });

  const jornada = DATOS.jornadas.find(j => String(j.id_jornada) === String(ADMIN.jornadaSel));
  $('#pub-btn').addEventListener('click', e =>
    operar(e.target, async () => {
      const estado = e.target.dataset.estado;
      await postScript('setPublicacion', { id_jornada: ADMIN.jornadaSel, estado_publicacion: estado });
      jornada.estado_publicacion = estado;
      return estado === 'publicada' ? 'Jornada publicada.' : 'Jornada devuelta a borrador.';
    }));

  document.querySelectorAll('#main [data-campo]').forEach(el => {
    el.addEventListener('change', () => {
      const tr = el.closest('tr');
      const id = tr.dataset.alumno;
      ADMIN.filas[id][el.dataset.campo] = el.value;
      const f = ADMIN.filas[id];
      if (el.dataset.campo === 'estado_entrega') {
        const off = f.estado_entrega === 'No entregado';
        tr.querySelectorAll('[data-campo="calidad"],[data-campo="entrega"],[data-campo="correccion"]')
          .forEach(s => s.disabled = off);
      }
      tr.querySelector('.total-celda').textContent = totalLocal(f);
    });
  });

  const btnGuardar = $('#guardar-btn');
  if (btnGuardar) btnGuardar.addEventListener('click', e =>
    operar(e.target, async () => {
      const registros = alumnosActivos().map(a => {
        const f = ADMIN.filas[a.id_alumno];
        return {
          id_alumno: a.id_alumno,
          id_equipo_en_jornada: a.id_equipo_actual,
          estado_entrega: f.estado_entrega,
          calidad: f.calidad,
          entrega_puntualidad: Number(f.entrega) || 0,
          correccion: Number(f.correccion) || 0,
          racha_manual: f.racha,
        };
      });
      const res = await postScript('saveJornada', { id_jornada: ADMIN.jornadaSel, registros });
      // Reflejo local inmediato (la copia pública de Google tarda unos minutos)
      registros.forEach(reg => {
        const f = ADMIN.filas[reg.id_alumno];
        const nuevo = {
          id_jornada: ADMIN.jornadaSel, id_alumno: reg.id_alumno,
          id_equipo_en_jornada: reg.id_equipo_en_jornada,
          estado_entrega: reg.estado_entrega, calidad: reg.calidad,
          entrega_puntualidad: reg.entrega_puntualidad, correccion: reg.correccion,
          total: totalLocal(f), racha_manual: reg.racha_manual,
        };
        const i = DATOS.registros.findIndex(r =>
          String(r.id_jornada) === String(ADMIN.jornadaSel) &&
          String(r.id_alumno) === String(reg.id_alumno));
        if (i >= 0) DATOS.registros[i] = nuevo; else DATOS.registros.push(nuevo);
      });
      return `Guardado: ${res.creados} nuevos, ${res.actualizados} actualizados.`;
    }));
}

      <div class="admin-barra" style="margin-top:14px">

        ${ed ? `<button class="btn-borde" id="j-cancelar">Cancelar</button>` : ''}
      </div>
      ${ed ? '' : `<p class="nota">La jornada se crea en estado <strong>borrador</strong>: no cuenta en
        la clasificación pública hasta que la publiques desde la pestaña Puntuar.</p>`}
    </div>
    <div class="card tabla-scroll">
      <h3>Jornadas del curso</h3>
      ${DATOS.jornadas.length === 0 ? `<p class="nota">Todavía no hay jornadas.</p>` : `
      <table>
        <thead><tr><th>N.º</th><th>Título</th><th>Fecha</th><th>Trim.</th><th>Estado</th><th></th></tr></thead>
        <tbody>${[...DATOS.jornadas].sort((a, b) => num(a.numero_jornada) - num(b.numero_jornada)).map(j => `
          <tr>
            <td class="num">J${esc(j.numero_jornada)}</td>
            <td><strong>${esc(j.titulo || '—')}</strong></td>
            <td>${esc(j.fecha || '—')}</td>
            <td class="num">${esc(j.trimestre)}</td>
            <td><span class="estado-chip ${String(j.estado_publicacion).toLowerCase() === 'publicada' ? 'chip-pub' : 'chip-borr'}">${esc(j.estado_publicacion)}</span></td>
            <td style="text-align:right"><button class="btn-borde btn-mini" data-editar="${esc(j.id_jornada)}">Editar</button></td>
          </tr>`).join('')}
        </tbody>
      </table>`}
    </div>`;
}

function wireJornadas() {
  document.querySelectorAll('[data-editar]').forEach(b =>
    b.addEventListener('click', () => { ADMIN.editJornada = b.dataset.editar; renderAdmin(); }));
  const cancelar = $('#j-cancelar');
  if (cancelar) cancelar.addEventListener('click', () => { ADMIN.editJornada = null; renderAdmin(); });

  $('#j-guardar').addEventListener('click', e =>
    operar(e.target, async () => {
      const datos = {
        id_jornada: ADMIN.editJornada || '',
        numero_jornada: valorDe('j-numero') || '1',
        titulo: valorDe('j-titulo'),
        fecha: valorDe('j-fecha'),
        trimestre: valorDe('j-trimestre'),
        descripcion: valorDe('j-descripcion'),
      };
      if (!datos.titulo) throw new Error('La jornada necesita un título.');
      const esEdicion = !!ADMIN.editJornada;
      if (esEdicion) {
        const j = DATOS.jornadas.find(x => String(x.id_jornada) === String(ADMIN.editJornada));
        datos.estado_publicacion = j.estado_publicacion; // se conserva
        const res = await postScript('saveJornadaMeta', { datos });
        Object.assign(j, datos, { id_jornada: res.id_jornada });
      } else {
        datos.estado_publicacion = 'borrador';
        const res = await postScript('saveJornadaMeta', { datos });
        DATOS.jornadas.push({ ...datos, id_jornada: res.id_jornada });
        ADMIN.jornadaSel = String(res.id_jornada);
        prepararFilas();
      }
      ADMIN.editJornada = null;
      return esEdicion ? 'Jornada actualizada.' : 'Jornada creada (en borrador).';
    }));
}

function wireAlumnos() {
  document.querySelectorAll('[data-editar]').forEach(b =>
    b.addEventListener('click', () => { ADMIN.editAlumno = b.dataset.editar; renderAdmin(); }));
  const cancelar = $('#a-cancelar');
  if (cancelar) cancelar.addEventListener('click', () => { ADMIN.editAlumno = null; renderAdmin(); });

  $('#a-guardar').addEventListener('click', e =>
    operar(e.target, async () => {
      const datos = {
        id_alumno: ADMIN.editAlumno || '',
        nombre_publico: valorDe('a-nombre'),
        genero: valorDe('a-genero'),
        instrumento: valorDe('a-instrumento'),
        id_equipo_actual: valorDe('a-equipo'),
        activo: marcado('a-activo'),
      };
      if (!datos.nombre_publico) throw new Error('El alumno necesita un nombre público.');
      const res = await postScript('saveAlumno', { datos });
      const local = { ...datos, id_alumno: res.id_alumno, activo: datos.activo ? 'TRUE' : 'FALSE' };
      const i = DATOS.alumnos.findIndex(a => String(a.id_alumno) === String(res.id_alumno));
      if (i >= 0) DATOS.alumnos[i] = { ...DATOS.alumnos[i], ...local }; else DATOS.alumnos.push(local);
      prepararFilas(); // la lista de la pantalla Puntuar cambia
      const esEdicion = !!ADMIN.editAlumno;
      ADMIN.editAlumno = null;
      return esEdicion ? 'Alumno/a actualizado.' : 'Alumno/a creado.';
    }));
}

function wireLiga() {
  $('#c-guardar').addEventListener('click', e =>

        curso: valorDe('c-curso'),
        profesor: valorDe('c-profesor'),

        jornada_actual: valorDe('c-jornada'),
      };
      await postScript('saveConfig', { config });
      Object.assign(DATOS.config, config);

      if (config.nombre_liga) { $('#titulo').textContent = config.nombre_liga; document.title = config.nombre_liga; }

      return 'Configuración guardada.';
    }));
}

/** Normaliza una fecha mostrada (dd/mm/aaaa o aaaa-mm-dd) al formato del input date. */
function fechaISO(f) {
  const s = String(f || '');
  const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return `${m[3]}-${m[2].padStart(2, '0')}-${m[1].padStart(2, '0')}`;
  return /^\d{4}-\d{2}-\d{2}$/.test(s) ? s : '';
}

(async function iniciar() {
  if (!SPREADSHEET_ID || SPREADSHEET_ID.startsWith('PEGA_AQUI')) {
    mostrarError('Falta configurar la hoja',
      `Abre este archivo <code>index.html</code> con un editor de texto y pega el ID de tu hoja de
       Google Sheets en la constante <code>SPREADSHEET_ID</code> (al principio del archivo).
       Recuerda compartir la hoja como «Cualquier persona con el enlace: Lector».`);
    return;
  }
  try {
    DATOS = await cargarDatos();
    TRIMESTRE = String(DATOS.config.trimestre_activo || '1');
    if (!TRIMESTRES.some(([v]) => v === TRIMESTRE)) TRIMESTRE = '1';
    if (DATOS.config.nombre_liga) { $('#titulo').textContent = DATOS.config.nombre_liga; document.title = DATOS.config.nombre_liga; }
    if (DATOS.config.curso) { $('#curso').textContent = DATOS.config.curso; $('#temporada').hidden = false; }
    if (DATOS.config.profesor) { $('#pie').textContent += ' · ' + DATOS.config.profesor; }
    render();
  } catch (err) {
    mostrarError('No se pudieron cargar los datos',
      `${esc(err.message)}<br><br>Comprueba que el ID de la hoja es correcto, que está compartida como
       «Cualquier persona con el enlace: Lector» y que las pestañas se llaman CONFIG, ALUMNOS,
       EQUIPOS, JORNADAS y REGISTROS.`);
  }
})();
</script>
