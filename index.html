function totalLocal(f) {
  if (f.estado_entrega === 'No entregado') return 0;
  const cal = f.calidad === '' ? 0 : Number(f.calidad) || 0;
  return Math.min(10, cal + (Number(f.entrega) || 0) + (Number(f.correccion) || 0));
}

function prepararFilas() {
  const existentes = new Map(
    DATOS.registros
      .filter(r => String(r.id_jornada) === String(ADMIN.jornadaSel))
      .map(r => [String(r.id_alumno), r])
  );
  ADMIN.filas = {};
  for (const a of alumnosActivos()) {
    const r = existentes.get(String(a.id_alumno));
    ADMIN.filas[a.id_alumno] = r ? {
      estado_entrega: r.estado_entrega || 'En plazo',
      calidad: (r.calidad === '' || r.calidad == null) ? '' : String(r.calidad),
      entrega: String(num(r.entrega_puntualidad)),
      correccion: String(num(r.correccion)),
      racha: (r.racha_manual === '' || r.racha_manual == null) ? '' : String(r.racha_manual),
      comentario: String(r.comentario || ''),
    } : { estado_entrega: 'En plazo', calidad: '', entrega: '0', correccion: '0', racha: '', comentario: '' };
  }
  prepararInsigniasFilas();
}

/** Como mucho una insignia por alumno y jornada (se elige con un desplegable). */
function prepararInsigniasFilas() {
  const existentes = new Map(
    DATOS.insigniasAlumnos
      .filter(x => String(x.id_jornada) === String(ADMIN.jornadaSel))
      .map(x => [String(x.id_alumno), String(x.id_insignia)])
  );
  ADMIN.insigniasFilas = {};
  for (const a of alumnosActivos()) {
    ADMIN.insigniasFilas[a.id_alumno] = existentes.get(String(a.id_alumno)) || '';
  }
}

/* ---------- Render principal del panel ---------- */

function renderAdmin(mensaje = '', esError = false) {
  const main = $('#main');

  if (!SCRIPT_URL || SCRIPT_URL.startsWith('PEGA_AQUI')) {
    main.innerHTML = `<div class="aviso card"><h2>Falta el script de escritura</h2>
      <p>Las vistas públicas ya funcionan. Para gestionar la liga desde la web, instala el
      script <code>Code-escritura.gs</code> en tu hoja (Extensiones → Apps Script), define
      <code>ADMIN_TOKEN</code> en Propiedades del script, impleméntalo como aplicación web
      y pega la URL en la constante <code>SCRIPT_URL</code> de este <code>index.html</code>.</p></div>`;
    return;
  }
  if (!DATOS) {
    main.innerHTML = `<div class="aviso card"><h2>Sin datos</h2>
      <p>No se han podido cargar los datos de la hoja. Recarga la página.</p></div>`;
    return;
  }

  // --- Acceso ---
  if (!ADMIN.token) {
    main.innerHTML = `<div class="card login-caja">
      <h2 style="color:var(--gold)">Zona técnica</h2>
      <p class="secundario">Introduce el token de administrador. Se comprueba en el servidor
      y solo se guarda en esta pestaña del navegador.</p>
      <input type="password" id="token-input" placeholder="Token de administrador" autocomplete="off" />
      <button class="btn-oro" id="token-btn">Entrar</button>
      <p id="token-msg" class="msg-error" style="margin-top:10px"></p>
    </div>`;
    const input = $('#token-input');
    const entrar = async () => {
      const t = input.value.trim();
      if (!t) return;
      $('#token-btn').disabled = true;
      try {
        ADMIN.token = t;
        await postScript('verifyToken');
        sessionStorage.setItem('liga_admin_token', t);
        renderAdmin();
      } catch (err) {
        ADMIN.token = '';
        $('#token-msg').textContent = err.message;
        $('#token-btn').disabled = false;
      }
    };
    $('#token-btn').addEventListener('click', entrar);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') entrar(); });
    input.focus();
    return;
  }

  // --- Estructura común: cabecera + subnavegación + sección ---
  const SECCIONES = [
    ['puntuar', 'Puntuar'], ['jornadas', 'Jornadas'], ['alumnos', 'Alumnos'], ['grupos', 'Grupos'],
    ['equipos', 'Equipos'], ['criterios', 'Criterios'], ['insignias', 'Insignias'], ['liga', 'Liga'],
  ];
  const subnav = `<div class="pills" style="margin-bottom:16px">
    ${SECCIONES.map(([v, l]) =>
      `<button data-seccion="${v}" class="${ADMIN.seccion === v ? 'on' : ''}">${l}</button>`).join('')}
  </div>`;

  const cuerpo =
    ADMIN.seccion === 'jornadas' ? seccionJornadas() :
    ADMIN.seccion === 'alumnos' ? seccionAlumnos() :
    ADMIN.seccion === 'grupos' ? seccionGrupos() :
    ADMIN.seccion === 'equipos' ? seccionEquipos() :
    ADMIN.seccion === 'criterios' ? seccionCriterios() :
    ADMIN.seccion === 'insignias' ? seccionInsignias() :
    ADMIN.seccion === 'liga' ? seccionLiga() :
    seccionPuntuar();

  main.innerHTML = `
    <div class="fila-titulo">
      <h2 style="color:var(--gold)">Zona técnica</h2>
      <button class="btn-borde" id="salir-btn">Salir</button>
    </div>
    ${subnav}
    <p id="admin-aviso" class="${esError ? 'msg-error' : 'msg-ok'}" style="margin:0 0 12px">${esc(mensaje)}</p>
    ${cuerpo}`;

  $('#salir-btn').addEventListener('click', () => {
    sessionStorage.removeItem('liga_admin_token');
    ADMIN.token = '';
    renderAdmin();
  });
  main.querySelectorAll('[data-seccion]').forEach(b =>
    b.addEventListener('click', () => { ADMIN.seccion = b.dataset.seccion; renderAdmin(); }));

  if (ADMIN.seccion === 'puntuar') wirePuntuar();
  else if (ADMIN.seccion === 'jornadas') wireJornadas();
  else if (ADMIN.seccion === 'alumnos') wireAlumnos();
  else if (ADMIN.seccion === 'grupos') wireGrupos();
  else if (ADMIN.seccion === 'equipos') wireEquipos();
  else if (ADMIN.seccion === 'criterios') wireCriterios();
  else if (ADMIN.seccion === 'insignias') wireInsignias();
  else if (ADMIN.seccion === 'liga') wireLiga();
  wireTooltips(main);
}

/** Envuelve un guardado: deshabilita el botón, ejecuta y muestra el resultado. */
async function operar(boton, fn, okMsg) {
  if (ADMIN.ocupado) return;
  ADMIN.ocupado = true;
  if (boton) boton.disabled = true;
  try {
    const msg = await fn();
    ADMIN.ocupado = false;
    renderAdmin(msg || okMsg || 'Guardado.');
  } catch (err) {
    ADMIN.ocupado = false;
    renderAdmin(err.message, true);
  }
}

/* ---------- Sección: Puntuar ---------- */

function seccionPuntuar() {
  if (DATOS.jornadas.length === 0) {
    return `<div class="card"><p class="nota">Todavía no hay jornadas. Crea la primera en la
      pestaña <strong>Jornadas</strong>.</p></div>`;
  }
  if (!ADMIN.jornadaSel || !DATOS.jornadas.some(j => String(j.id_jornada) === String(ADMIN.jornadaSel))) {
    ADMIN.jornadaSel = String(DATOS.jornadas[DATOS.jornadas.length - 1].id_jornada);
    prepararFilas();
  }
  if (Object.keys(ADMIN.filas).length === 0) prepararFilas();

  const jornada = DATOS.jornadas.find(j => String(j.id_jornada) === String(ADMIN.jornadaSel));
  const publicada = jornada && String(jornada.estado_publicacion).toLowerCase() === 'publicada';
  const insignias = insigniasActivas();
  // Solo alumnos del mismo curso que la jornada (y, si la jornada es de un
  // grupo concreto, solo ese grupo): las jornadas son propias de cada curso
  // y, opcionalmente, de un único grupo dentro de él.
  const alumnosDeJornada = alumnosActivos().filter(a =>
    (!jornada || !jornada.id_curso || String(idCursoDeAlumno(DATOS, a)) === String(jornada.id_curso)) &&
    (!jornada || !jornada.id_grupo || String(a.id_grupo) === String(jornada.id_grupo)));
  const grupoFijado = jornada && jornada.id_grupo ? grupoDe(DATOS, jornada.id_grupo) : null;
  const grupos = jornada && jornada.id_curso && !grupoFijado ? gruposDeCurso(DATOS, jornada.id_curso) : [];
  const alumnosVisibles = alumnosDeJornada.filter(a => grupoFijado || !ADMIN.puntuarGrupoSel || String(a.id_grupo) === String(ADMIN.puntuarGrupoSel));

  return `
    <div class="card admin-barra" style="margin-bottom:14px">
      <label style="display:flex;align-items:center;gap:8px;font-size:14px;color:var(--muted)">
        Jornada
        <select id="jornada-sel">
          ${DATOS.jornadas.map(j => `<option value="${esc(j.id_jornada)}" ${String(j.id_jornada) === String(ADMIN.jornadaSel) ? 'selected' : ''}>
            J${esc(j.numero_jornada)} · ${esc(j.titulo || 'Sin título')} · ${esc((cursoDe(DATOS, j.id_curso) || {}).nombre_curso || 'Sin curso')}${j.id_grupo ? ' · ' + esc((grupoDe(DATOS, j.id_grupo) || {}).nombre_grupo || '') : ''} (${esc(j.estado_publicacion)})
          </option>`).join('')}
        </select>
      </label>
      ${grupoFijado ? `<span class="estado-chip">Grupo: ${esc(grupoFijado.nombre_grupo)}</span>` : ''}
      ${grupos.length > 0 ? `<label style="display:flex;align-items:center;gap:8px;font-size:14px;color:var(--muted)">
        Grupo
        <select id="puntuar-grupo-sel">
          <option value="">Todos los grupos</option>
          ${grupos.map(g => `<option value="${esc(g.id_grupo)}" ${ADMIN.puntuarGrupoSel === g.id_grupo ? 'selected' : ''}>${esc(g.nombre_grupo)}</option>`).join('')}
        </select>
      </label>` : ''}
      <span class="estado-chip ${publicada ? 'chip-pub' : 'chip-borr'}">${publicada ? 'Publicada' : 'Borrador'}</span>
      <div class="derecha">
        ${publicada
          ? `<button class="btn-borde" id="pub-btn" data-estado="borrador">Devolver a borrador</button>`
          : `<button class="btn-oro" id="pub-btn" data-estado="publicada">Publicar jornada</button>`}
      </div>
    </div>
    <div class="card tabla-scroll">
      ${alumnosVisibles.length === 0 ? `<p class="nota">${ADMIN.puntuarGrupoSel ? 'Ningún alumno activo en ese grupo.' : 'No hay alumnos activos de ese curso. Revisa la pestaña <strong>Alumnos</strong> o <strong>Grupos</strong>.'}</p>` : `
      <table class="tabla-admin">
        <thead><tr>
          <th>Alumno/a</th><th>Estado</th><th>Calidad</th><th>Entrega</th>
          <th>Corrección</th><th style="text-align:center">Total</th><th>Racha</th>
          ${insignias.length ? '<th>Insignias</th>' : ''}<th>Comentarios</th>
        </tr></thead>
        <tbody>
          ${alumnosVisibles.map(a => {
            const f = ADMIN.filas[a.id_alumno];
            const off = f.estado_entrega === 'No entregado' ? 'disabled' : '';
            const insAlumno = ADMIN.insigniasFilas[a.id_alumno] || '';
            return `<tr data-alumno="${esc(a.id_alumno)}">
              <td><strong>${esc(a.nombre_publico)}</strong></td>
              <td><select data-campo="estado_entrega">
                ${ESTADOS_ENTREGA.map(s => `<option ${f.estado_entrega === s ? 'selected' : ''}>${s}</option>`).join('')}
              </select></td>
              <td><select data-campo="calidad" ${off}>
                ${['', '0', '1', '2', '3', '4', '5', '6', '7', '8'].map(c =>
                  `<option value="${c}" ${f.calidad === c ? 'selected' : ''}>${c === '' ? '—' : c}</option>`).join('')}
              </select></td>
              <td><select data-campo="entrega" ${off}>
                <option value="0" ${f.entrega === '0' ? 'selected' : ''}>0</option>
                <option value="1" ${f.entrega === '1' ? 'selected' : ''}>1</option>
              </select></td>
              <td><select data-campo="correccion" ${off}>
                <option value="0" ${f.correccion === '0' ? 'selected' : ''}>0</option>
                <option value="1" ${f.correccion === '1' ? 'selected' : ''}>1</option>
              </select></td>
              <td class="total-celda">${totalLocal(f)}</td>
              <td><input type="number" min="0" data-campo="racha" value="${esc(f.racha)}" /></td>
              ${insignias.length ? `<td><select data-insignia-alumno>
                <option value="">— Ninguna —</option>
                ${insignias.map(i => `<option value="${esc(i.id_insignia)}" ${insAlumno === String(i.id_insignia) ? 'selected' : ''}>${esc(i.nombre)}</option>`).join('')}
              </select></td>` : ''}
              <td><input type="text" data-campo="comentario" value="${esc(f.comentario)}" placeholder="Comentario…" style="min-width:160px" /></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      <div class="admin-barra" style="margin-top:16px">
        <button class="btn-oro" id="guardar-btn">Guardar toda la jornada</button>
      </div>
      <p class="nota">El total se calcula al guardar (máximo 10; «No entregado» = 0). Guardar no duplica:
      actualiza el registro de cada alumno en esta jornada — incluidos los que el filtro de grupo esté
      ocultando ahora mismo, no solo los que se ven en la tabla.
      ${insignias.length ? 'Elige en el desplegable la insignia (como mucho una) que se lleva cada alumno en esta jornada.' : ''}
      La vista para otros visitantes tarda unos minutos en refrescarse.</p>`}
    </div>`;
}

function wirePuntuar() {
  const sel = $('#jornada-sel');
  if (!sel) return;
  sel.addEventListener('change', e => {
    ADMIN.jornadaSel = e.target.value;
    ADMIN.puntuarGrupoSel = ''; // el grupo elegido puede no existir en el curso de la nueva jornada
    prepararFilas();
    renderAdmin();
  });

  const selGrupo = $('#puntuar-grupo-sel');
  if (selGrupo) selGrupo.addEventListener('change', e => {
    ADMIN.puntuarGrupoSel = e.target.value;
    renderAdmin();
  });

  const jornada = DATOS.jornadas.find(j => String(j.id_jornada) === String(ADMIN.jornadaSel));
  $('#pub-btn').addEventListener('click', e =>
    operar(e.target, async () => {
      const estado = e.target.dataset.estado;
      await postScript('setPublicacion', { id_jornada: ADMIN.jornadaSel, estado_publicacion: estado });
      jornada.estado_publicacion = estado;
      return estado === 'publicada' ? 'Jornada publicada.' : 'Jornada devuelta a borrador.';
    }));

  document.querySelectorAll('#main [data-campo]').forEach(el => {
    el.addEventListener('change', () => {
      const tr = el.closest('tr');
      const id = tr.dataset.alumno;
      ADMIN.filas[id][el.dataset.campo] = el.value;
      const f = ADMIN.filas[id];
      if (el.dataset.campo === 'estado_entrega') {
        const off = f.estado_entrega === 'No entregado';
        tr.querySelectorAll('[data-campo="calidad"],[data-campo="entrega"],[data-campo="correccion"]')
          .forEach(s => s.disabled = off);
      }
      tr.querySelector('.total-celda').textContent = totalLocal(f);
    });
  });

  document.querySelectorAll('#main [data-insignia-alumno]').forEach(sel => {
    sel.addEventListener('change', () => {
      const tr = sel.closest('tr');
      ADMIN.insigniasFilas[tr.dataset.alumno] = sel.value;
    });
  });

  const btnGuardar = $('#guardar-btn');
  if (btnGuardar) btnGuardar.addEventListener('click', e =>
    operar(e.target, async () => {
      const jornadaGuardar = DATOS.jornadas.find(x => String(x.id_jornada) === String(ADMIN.jornadaSel));
      const alumnosDeJornada = alumnosActivos().filter(a =>
        (!jornadaGuardar || !jornadaGuardar.id_curso || String(idCursoDeAlumno(DATOS, a)) === String(jornadaGuardar.id_curso)) &&
        (!jornadaGuardar || !jornadaGuardar.id_grupo || String(a.id_grupo) === String(jornadaGuardar.id_grupo)));
      const registros = alumnosDeJornada.map(a => {
        const f = ADMIN.filas[a.id_alumno];
        return {
          id_alumno: a.id_alumno,
          id_equipo_en_jornada: a.id_equipo_actual,
          estado_entrega: f.estado_entrega,
          calidad: f.calidad,
          entrega_puntualidad: Number(f.entrega) || 0,
          correccion: Number(f.correccion) || 0,
          racha_manual: f.racha,
          comentario: f.comentario,
        };
      });
      const res = await postScript('saveJornada', { id_jornada: ADMIN.jornadaSel, registros });
      // Reflejo local inmediato (la copia pública de Google tarda unos minutos)
      registros.forEach(reg => {
        const f = ADMIN.filas[reg.id_alumno];
        const nuevo = {
          id_jornada: ADMIN.jornadaSel, id_alumno: reg.id_alumno,
          id_equipo_en_jornada: reg.id_equipo_en_jornada,
          estado_entrega: reg.estado_entrega, calidad: reg.calidad,
          entrega_puntualidad: reg.entrega_puntualidad, correccion: reg.correccion,
          total: totalLocal(f), racha_manual: reg.racha_manual, comentario: reg.comentario,
        };
        const i = DATOS.registros.findIndex(r =>
          String(r.id_jornada) === String(ADMIN.jornadaSel) &&
          String(r.id_alumno) === String(reg.id_alumno));
        if (i >= 0) DATOS.registros[i] = nuevo; else DATOS.registros.push(nuevo);
      });

      // Solo se toca la pestaña de insignias si hay alguna activa; si no, no hay
      // columna que editar y no queremos borrar asignaciones de insignias ya
      // desactivadas que puedan seguir ahí por historial.
      if (insigniasActivas().length > 0) {
        const asignaciones = [];
        alumnosDeJornada.forEach(a => {
          const idInsignia = ADMIN.insigniasFilas[a.id_alumno];
          if (idInsignia) asignaciones.push({ id_alumno: a.id_alumno, id_insignia: idInsignia });
        });
        await postScript('saveAsignacionesInsignias', { id_jornada: ADMIN.jornadaSel, asignaciones });
        DATOS.insigniasAlumnos = DATOS.insigniasAlumnos.filter(x => String(x.id_jornada) !== String(ADMIN.jornadaSel));
        asignaciones.forEach(a => DATOS.insigniasAlumnos.push({ ...a, id_jornada: ADMIN.jornadaSel }));
      }

      return `Guardado: ${res.creados} nuevos, ${res.actualizados} actualizados.`;
    }));
}

/* ---------- Sección: Jornadas ---------- */

/**
 * Siguiente n.º de jornada libre dentro de un curso y grupo: cada grupo (y
 * las jornadas de todo el curso, sin grupo) tienen su propia numeración
 * independiente, así que hay que acotar por los dos campos a la vez.
 */
function siguienteNumeroCurso(idCurso, idGrupo) {
  return DATOS.jornadas
    .filter(j => String(j.id_curso) === String(idCurso) && String(j.id_grupo || '') === String(idGrupo || ''))
    .reduce((m, j) => Math.max(m, num(j.numero_jornada)), 0) + 1;
}

function seccionJornadas() {
  const ed = ADMIN.editJornada
    ? DATOS.jornadas.find(j => String(j.id_jornada) === String(ADMIN.editJornada))
    : null;
  const mostrarForm = !!ed || ADMIN.nuevaJornada;
  const cursos = cursosActivos(DATOS);
  const cursoSel = ed ? ed.id_curso : (ADMIN.jornadaCursoSel || (cursos[0] || {}).id_curso || '');
  const grupoSel = ed ? (ed.id_grupo || '') : (ADMIN.jornadaGrupoSel || '');

  const CAMPOS_ORDEN_JORNADAS = {
    numero: j => num(j.numero_jornada),
    curso: j => String((cursoDe(DATOS, j.id_curso) || {}).nombre_curso || ''),
    grupo: j => j.id_grupo ? String((grupoDe(DATOS, j.id_grupo) || {}).nombre_grupo || '') : '',
    titulo: j => String(j.titulo || ''),
    tareas: j => String(j.tareas || ''),
    fecha: j => String(j.fecha || ''),
    trimestre: j => num(j.trimestre),
    estado: j => String(j.estado_publicacion || ''),
  };
  const ordenValor = CAMPOS_ORDEN_JORNADAS[ADMIN.jornadasOrden.campo] || CAMPOS_ORDEN_JORNADAS.fecha;
  const jornadasOrdenadas = [...DATOS.jornadas].sort((a, b) => {
    const va = ordenValor(a), vb = ordenValor(b);
    let cmp = typeof va === 'number' && typeof vb === 'number' ? va - vb : String(va).localeCompare(String(vb), 'es');
    if (cmp === 0) cmp = compararFechaJornada(a, b); // desempate estable
    return ADMIN.jornadasOrden.dir === 'desc' ? -cmp : cmp;
  });

  return `
    ${mostrarForm ? `<div class="card" style="margin-bottom:14px">
      <h3>${ed ? `Editar jornada J${esc(ed.numero_jornada)}` : 'Nueva jornada'}</h3>
      <div class="form-grid">
        <label>Curso<select id="j-curso">
          ${cursos.length === 0 ? `<option value="">— Crea un curso primero —</option>` : ''}
          ${cursos.map(c => `<option value="${esc(c.id_curso)}" ${cursoSel === c.id_curso ? 'selected' : ''}>${esc(c.nombre_curso)}</option>`).join('')}
        </select></label>
        <label>Grupo (opcional)<select id="j-grupo">
          <option value="">— Todo el curso (todos los grupos) —</option>
          ${cursos.map(c => `<optgroup label="${esc(c.nombre_curso)}">
            ${gruposDeCurso(DATOS, c.id_curso).map(g => `<option value="${esc(g.id_grupo)}" ${grupoSel === g.id_grupo ? 'selected' : ''}>${esc(g.nombre_grupo)}</option>`).join('')}
          </optgroup>`).join('')}
        </select></label>
        <label>N.º de jornada<input type="number" id="j-numero" min="1" value="${ed ? esc(ed.numero_jornada) : siguienteNumeroCurso(cursoSel, grupoSel)}" /></label>
        <label>Título<input type="text" id="j-titulo" value="${ed ? esc(ed.titulo) : ''}" placeholder="p. ej. Enlace de acordes I-IV-V" /></label>
        <label>Fecha<input type="date" id="j-fecha" value="${ed ? esc(fechaISO(ed.fecha)) : hoyISO()}" /></label>
        <label>Trimestre<select id="j-trimestre">
          ${['1', '2', '3'].map(t => `<option value="${t}" ${String(ed ? ed.trimestre : DATOS.config.trimestre_activo || '1') === t ? 'selected' : ''}>${t}.º</option>`).join('')}
        </select></label>
        <label style="grid-column:1/-1">Descripción<input type="text" id="j-descripcion" value="${ed ? esc(ed.descripcion) : ''}" /></label>
        <label style="grid-column:1/-1">Tareas<textarea id="j-tareas" placeholder="Qué tienen que preparar o entregar los alumnos en esta jornada">${ed ? esc(ed.tareas) : ''}</textarea></label>
      </div>
      <div class="admin-barra" style="margin-top:14px">
        <button class="btn-oro" id="j-guardar">${ed ? 'Guardar cambios' : 'Crear jornada'}</button>
        <button class="btn-borde" id="j-cancelar">Cancelar</button>
      </div>
      ${ed ? '' : `<p class="nota">Las jornadas son propias de cada curso (no se comparten). Si dejas «Grupo» en
        todo el curso, cuenta para todos sus grupos; si eliges un grupo concreto, solo se puntúa (y solo cuenta
        para la clasificación) ese grupo — así cada grupo puede tener un número distinto de jornadas y su propia
        numeración J1, J2... Se crea en estado <strong>borrador</strong>: no cuenta en la clasificación pública
        hasta que la publiques desde la pestaña Puntuar.</p>`}
    </div>` : ''}
    <div class="card tabla-scroll">
      <h3>Jornadas (${DATOS.jornadas.length})</h3>
      ${DATOS.jornadas.length === 0 ? `<p class="nota">Todavía no hay jornadas.</p>` : `
      <table>
        <thead><tr>${[
          ['numero', 'N.º'], ['curso', 'Curso'], ['grupo', 'Grupo'], ['titulo', 'Título'],
          ['tareas', 'Tareas'], ['fecha', 'Fecha'], ['trimestre', 'Trim.'], ['estado', 'Estado'],
        ].map(([campo, etiqueta]) => {
          const activo_ = ADMIN.jornadasOrden.campo === campo;
          const flecha = activo_ ? (ADMIN.jornadasOrden.dir === 'asc' ? ' ▲' : ' ▼') : '';
          return `<th data-orden-campo="${campo}" style="cursor:pointer;user-select:none" title="Ordenar por ${etiqueta.toLowerCase()}">${etiqueta}${flecha}</th>`;
        }).join('')}<th></th></tr></thead>
        <tbody>${jornadasOrdenadas.map(j => `
          <tr>
            <td class="num">J${esc(j.numero_jornada)}</td>
            <td>${esc((cursoDe(DATOS, j.id_curso) || {}).nombre_curso || '—')}</td>
            <td>${j.id_grupo ? esc((grupoDe(DATOS, j.id_grupo) || {}).nombre_grupo || '—') : '<span style="color:var(--muted)">Todo el curso</span>'}</td>
            <td><strong>${esc(j.titulo || '—')}</strong></td>
            <td style="max-width:220px;color:var(--muted)">${esc(j.tareas || '—')}</td>
            <td>${esc(j.fecha ? fmtFecha(j.fecha) : '—')}</td>
            <td class="num">${esc(j.trimestre)}</td>
            <td><span class="estado-chip ${String(j.estado_publicacion).toLowerCase() === 'publicada' ? 'chip-pub' : 'chip-borr'}">${esc(j.estado_publicacion)}</span></td>
            <td style="text-align:right"><button class="btn-borde btn-mini" data-editar="${esc(j.id_jornada)}">Editar</button></td>
          </tr>`).join('')}
        </tbody>
      </table>`}
      <div class="admin-barra" style="margin-top:14px;justify-content:flex-end">
        <button class="btn-oro" id="j-nuevo">+ Nueva jornada</button>
      </div>
    </div>`;
}

function wireJornadas() {
  document.querySelectorAll('[data-editar]').forEach(b =>
    b.addEventListener('click', () => { ADMIN.editJornada = b.dataset.editar; ADMIN.nuevaJornada = false; renderAdmin(); }));
  const cancelar = $('#j-cancelar');
  if (cancelar) cancelar.addEventListener('click', () => { ADMIN.editJornada = null; ADMIN.nuevaJornada = false; renderAdmin(); });

  const nuevo = $('#j-nuevo');
  if (nuevo) nuevo.addEventListener('click', () => { ADMIN.nuevaJornada = true; ADMIN.editJornada = null; renderAdmin(); });

  document.querySelectorAll('[data-orden-campo]').forEach(th => th.addEventListener('click', () => {
    const campo = th.dataset.ordenCampo;
    if (ADMIN.jornadasOrden.campo === campo) {
      ADMIN.jornadasOrden.dir = ADMIN.jornadasOrden.dir === 'asc' ? 'desc' : 'asc';
    } else {
      ADMIN.jornadasOrden = { campo, dir: 'asc' };
    }
    renderAdmin();
  }));

  const selCurso = $('#j-curso');
  const selGrupo = $('#j-grupo');
  if (selCurso) selCurso.addEventListener('change', () => {
    ADMIN.jornadaCursoSel = selCurso.value;
    // El grupo elegido puede no pertenecer al nuevo curso: se resetea.
    if (selGrupo && selGrupo.value) {
      const g = grupoDe(DATOS, selGrupo.value);
      if (!g || String(g.id_curso) !== String(selCurso.value)) { selGrupo.value = ''; ADMIN.jornadaGrupoSel = ''; }
    }
    if (!ADMIN.editJornada) {
      const numero = $('#j-numero');
      if (numero) numero.value = siguienteNumeroCurso(selCurso.value, selGrupo ? selGrupo.value : '');
    }
  });
  if (selGrupo) selGrupo.addEventListener('change', () => {
    ADMIN.jornadaGrupoSel = selGrupo.value;
    if (selGrupo.value) {
      const g = grupoDe(DATOS, selGrupo.value);
      if (g && selCurso) { selCurso.value = g.id_curso; ADMIN.jornadaCursoSel = g.id_curso; }
    }
    if (!ADMIN.editJornada) {
      const numero = $('#j-numero');
      if (numero) numero.value = siguienteNumeroCurso(selCurso ? selCurso.value : '', selGrupo.value);
    }
  });

  const btnGuardar = $('#j-guardar');
  if (btnGuardar) btnGuardar.addEventListener('click', e =>
    operar(e.target, async () => {
      const datos = {
        id_jornada: ADMIN.editJornada || '',
        id_curso: valorDe('j-curso'),
        id_grupo: valorDe('j-grupo'),
        numero_jornada: valorDe('j-numero') || '1',
        titulo: valorDe('j-titulo'),
        fecha: valorDe('j-fecha'),
        trimestre: valorDe('j-trimestre'),
        descripcion: valorDe('j-descripcion'),
        tareas: valorDe('j-tareas'),
      };
      if (!datos.titulo) throw new Error('La jornada necesita un título.');
      if (!datos.id_curso) throw new Error('La jornada necesita un curso.');
      const esEdicion = !!ADMIN.editJornada;
      if (esEdicion) {
        const j = DATOS.jornadas.find(x => String(x.id_jornada) === String(ADMIN.editJornada));
        datos.estado_publicacion = j.estado_publicacion; // se conserva
        const res = await postScript('saveJornadaMeta', { datos });
        Object.assign(j, datos, { id_jornada: res.id_jornada });
      } else {
        datos.estado_publicacion = 'borrador';
        const res = await postScript('saveJornadaMeta', { datos });
        DATOS.jornadas.push({ ...datos, id_jornada: res.id_jornada });
        ADMIN.jornadaSel = String(res.id_jornada);
        prepararFilas();
      }
      ADMIN.editJornada = null;
      ADMIN.nuevaJornada = false;
      return esEdicion ? 'Jornada actualizada.' : 'Jornada creada (en borrador).';
    }));
}

        </select>
        ${hayFiltro ? `<button class="btn-borde btn-mini" id="af-limpiar">Quitar filtros</button>` : ''}
      </div>
      ${DATOS.alumnos.length === 0 ? `<p class="nota">Todavía no hay alumnos.</p>` :

      <div class="admin-barra" style="margin-top:14px;justify-content:flex-end">

function wireAlumnos() {
  if (ADMIN.editDianaAlumno) { wireDianaAlumno(); return; }
  if (ADMIN.verAlumno) { wireFichaAlumno(); return; }

  document.querySelectorAll('[data-ver-ficha]').forEach(b =>
    b.addEventListener('click', () => { ADMIN.verAlumno = b.dataset.verFicha; renderAdmin(); }));

  document.querySelectorAll('[data-diana]').forEach(b =>
    b.addEventListener('click', () => {
      ADMIN.editDianaAlumno = b.dataset.diana;
      ADMIN.filasDianaAlumno = {};
      renderAdmin();
    }));
  document.querySelectorAll('[data-editar]').forEach(b =>
    b.addEventListener('click', () => { ADMIN.editAlumno = b.dataset.editar; ADMIN.nuevoAlumno = false; renderAdmin(); }));

  const nuevo = $('#a-nuevo');
  if (nuevo) nuevo.addEventListener('click', () => { ADMIN.nuevoAlumno = true; ADMIN.editAlumno = null; renderAdmin(); });

  // Filtros de la Plantilla. El de nombre se filtra mientras se escribe, así
  // que hay que devolverle el foco y la posición del cursor a mano: al
  // volver a montar toda la tabla con renderAdmin(), el <input> de antes se
  // destruye y se crea uno nuevo, y si no se restaura el cursor solo se
  // podría escribir una letra cada vez.
  const inputNombreFiltro = $('#af-nombre');
  if (inputNombreFiltro) inputNombreFiltro.addEventListener('input', () => {
    const cursor = inputNombreFiltro.selectionStart;
    ADMIN.alumnosFiltro.nombre = inputNombreFiltro.value;
    renderAdmin();
    const nuevoInput = $('#af-nombre');
    if (nuevoInput) { nuevoInput.focus(); nuevoInput.setSelectionRange(cursor, cursor); }
  });

  const mapaFiltros = { 'af-curso': 'id_curso', 'af-grupo': 'id_grupo', 'af-instrumento': 'instrumento', 'af-equipo': 'id_equipo', 'af-estado': 'estado' };
  Object.keys(mapaFiltros).forEach(idEl => {
    const el = $('#' + idEl);
    if (el) el.addEventListener('change', () => { ADMIN.alumnosFiltro[mapaFiltros[idEl]] = el.value; renderAdmin(); });
  });

  const limpiarFiltros = $('#af-limpiar');
  if (limpiarFiltros) limpiarFiltros.addEventListener('click', () => {
    ADMIN.alumnosFiltro = { nombre: '', id_curso: '', id_grupo: '', instrumento: '', id_equipo: '', estado: '' };
    renderAdmin();
  });

  const cancelar = $('#a-cancelar');
  if (cancelar) cancelar.addEventListener('click', () => { ADMIN.editAlumno = null; ADMIN.nuevoAlumno = false; renderAdmin(); });

  const selGrupoForm = $('#a-grupo');
  if (selGrupoForm) selGrupoForm.addEventListener('change', () => {
    if (!selGrupoForm.value) return;
    const g = grupoDe(DATOS, selGrupoForm.value);
    const selCursoForm = $('#a-curso');
    if (g && selCursoForm) selCursoForm.value = g.id_curso;
  });

  const btnGuardar = $('#a-guardar');
  if (btnGuardar) btnGuardar.addEventListener('click', e =>
    operar(e.target, async () => {
      const datos = {
        id_alumno: ADMIN.editAlumno || '',
        nombre_publico: valorDe('a-nombre'),
        genero: valorDe('a-genero'),
        instrumento: valorDe('a-instrumento'),
        id_equipo_actual: valorDe('a-equipo'),
        id_curso: valorDe('a-curso'),
        id_grupo: valorDe('a-grupo'),
        color_pelo: valorDe('a-pelo'),
        color_camiseta: marcado('a-camiseta-custom') ? valorDe('a-camiseta') : '',
        activo: marcado('a-activo'),
      };
      if (!datos.nombre_publico) throw new Error('El alumno necesita un nombre público.');
      const res = await postScript('saveAlumno', { datos });
      const local = { ...datos, id_alumno: res.id_alumno, activo: datos.activo ? 'TRUE' : 'FALSE' };
      const i = DATOS.alumnos.findIndex(a => String(a.id_alumno) === String(res.id_alumno));
      if (i >= 0) DATOS.alumnos[i] = { ...DATOS.alumnos[i], ...local }; else DATOS.alumnos.push(local);
      prepararFilas(); // la lista de la pantalla Puntuar cambia
      const esEdicion = !!ADMIN.editAlumno;
      ADMIN.editAlumno = null;
      ADMIN.nuevoAlumno = false;
      return esEdicion ? 'Alumno/a actualizado.' : 'Alumno/a creado.';
    }));
}

/* ---------- Panel: Diana de un alumno (las 4 evaluaciones a la vez) ---------- */

function prepararFilasDianaAlumno(idAlumno) {
  const crits = criteriosActivos(DATOS);
  const porPeriodo = {};
  PERIODOS_DIANA.forEach(([p]) => { porPeriodo[p] = {}; });
  DATOS.evaluaciones
    .filter(e => String(e.id_alumno) === String(idAlumno))
    .forEach(e => {
      const p = String(e.periodo);
      if (!porPeriodo[p]) return;
      porPeriodo[p][String(e.id_criterio)] = (e.valor === '' || e.valor == null) ? '' : String(e.valor);
    });
  const filas = {};
  PERIODOS_DIANA.forEach(([p]) => {
    filas[p] = {};
    crits.forEach(c => { filas[p][c.id_criterio] = porPeriodo[p][String(c.id_criterio)] !== undefined ? porPeriodo[p][String(c.id_criterio)] : ''; });
  });
  ADMIN.filasDianaAlumno = filas;
}

function seccionDianaAlumno() {
  const a = DATOS.alumnos.find(x => String(x.id_alumno) === String(ADMIN.editDianaAlumno));
  if (!a) { ADMIN.editDianaAlumno = null; return seccionAlumnos(); }
  const crits = criteriosActivos(DATOS);
  if (Object.keys(ADMIN.filasDianaAlumno).length === 0) prepararFilasDianaAlumno(a.id_alumno);
  if (!PERIODOS_DIANA.some(([v]) => v === ADMIN.previewPeriodo)) ADMIN.previewPeriodo = '1';

  const cabecera = `
    <div class="fila-titulo">
      <h3 style="margin:0">Diana de ${esc(a.nombre_publico)}</h3>
      <button class="btn-borde btn-mini" id="diana-volver">← Volver a alumnos</button>
    </div>`;

  if (crits.length === 0) {
    return `${cabecera}<div class="card" style="margin-top:14px"><p class="nota">Todavía no hay
      criterios activos. Créalos en la pestaña <strong>Criterios</strong> antes de poder evaluar.</p></div>`;
  }

  const ejesPreview = crits.map(c => {
    const v = ADMIN.filasDianaAlumno[ADMIN.previewPeriodo][c.id_criterio];
    const evaluado = v !== '' && v != null;
    return { id: c.id_criterio, nombre: c.nombre, valor: evaluado ? num(v) : 0, evaluado };
  });

  return `${cabecera}
    <div class="card tabla-scroll" style="margin-top:14px">
      <table class="tabla-admin">
        <thead><tr><th>Criterio</th>${PERIODOS_DIANA.map(([, l]) => `<th>${l}</th>`).join('')}</tr></thead>
        <tbody>${crits.map(c => `
          <tr data-criterio="${esc(c.id_criterio)}">
            <td><strong>${esc(c.nombre)}</strong></td>
            ${PERIODOS_DIANA.map(([p]) => `<td><select data-periodo="${p}">
              ${['', '0', '1', '2', '3', '4', '5'].map(op =>
                `<option value="${op}" ${String(ADMIN.filasDianaAlumno[p][c.id_criterio] || '') === op ? 'selected' : ''}>${op === '' ? '—' : op}</option>`).join('')}
            </select></td>`).join('')}
          </tr>`).join('')}
        </tbody>
      </table>
      <div class="admin-barra" style="margin-top:16px">
        <button class="btn-oro" id="diana-guardar">Guardar todas las dianas</button>
      </div>
      <p class="nota">Escala 0-5; deja «—» si todavía no se ha evaluado ese criterio en ese periodo.</p>
    </div>
    <div class="card" style="margin-top:14px">
      <div class="fila-titulo" style="margin-bottom:14px">
        <h3 style="margin:0">Vista previa</h3>
        <div class="pills">${PERIODOS_DIANA.map(([v, l]) =>
          `<button data-preview-periodo="${v}" class="${ADMIN.previewPeriodo === v ? 'on' : ''}">${l}</button>`).join('')}</div>
      </div>
      ${svgDiana(ejesPreview)}
    </div>`;
}

function wireDianaAlumno() {
  $('#diana-volver').addEventListener('click', () => { ADMIN.editDianaAlumno = null; renderAdmin(); });

  document.querySelectorAll('[data-preview-periodo]').forEach(b =>
    b.addEventListener('click', () => { ADMIN.previewPeriodo = b.dataset.previewPeriodo; renderAdmin(); }));

  document.querySelectorAll('#main [data-periodo]').forEach(el => {
    el.addEventListener('change', () => {
      const tr = el.closest('tr');
      const idCriterio = tr.dataset.criterio;
      ADMIN.filasDianaAlumno[el.dataset.periodo][idCriterio] = el.value;
    });
  });

  const btnGuardar = $('#diana-guardar');
  if (btnGuardar) btnGuardar.addEventListener('click', e =>
    operar(e.target, async () => {
      const idAlumno = ADMIN.editDianaAlumno;
      const valoraciones = [];
      PERIODOS_DIANA.forEach(([p]) => {
        criteriosActivos(DATOS).forEach(c => {
          const v = ADMIN.filasDianaAlumno[p][c.id_criterio];
          if (v === '' || v == null) return;
          valoraciones.push({ id_alumno: idAlumno, periodo: p, id_criterio: c.id_criterio, valor: v });
        });
      });
      if (valoraciones.length === 0) throw new Error('No hay ninguna valoración rellenada que guardar.');
      const res = await postScript('saveEvaluaciones', { valoraciones });
      aplicarEvaluacionesLocal(valoraciones);
      return `Guardado: ${res.creados} nuevas, ${res.actualizados} actualizadas.`;
    }));
}

/* ---------- Panel: Ficha de un alumno (resumen de solo lectura, sin editar) ---------- */

/**
 * Ficha de solo lectura de un alumno para Admin: los mismos datos "vistosos"
 * que ya tiene su perfil público (posición, insignias, diana), más lo que
 * NO se ve en público — historial fila a fila de todas sus jornadas
 * (incluidas las que aún están en borrador) con el comentario del profesor
 * en cada una. Se calcula siempre sobre el curso completo (no un trimestre
 * concreto), para tener de un vistazo todo el histórico del alumno.
 */
function seccionFichaAlumno() {
  const a = DATOS.alumnos.find(x => String(x.id_alumno) === String(ADMIN.verAlumno));
  if (!a) { ADMIN.verAlumno = null; return seccionAlumnos(); }

  const eq = DATOS.equipos.find(e => String(e.id_equipo) === String(a.id_equipo_actual));
  const idCurso = idCursoDeAlumno(DATOS, a);
  const st = statsAlumno(DATOS, a.id_alumno, 'curso');
  const ind = clasIndividual(DATOS, 'curso', a.id_grupo, idCurso);
  const posActual = ind.find(f => f.id === String(a.id_alumno));

          ${svgAvatar(a, eq, 'grande')}
          <div>
            <p class="principal" style="margin:0 0 8px">${esc(a.nombre_publico)}</p>
            <p class="secundario" style="margin-top:6px">${esc(lugarDeAlumno(DATOS, a) || 'Sin curso/grupo')}</p>
            <p class="secundario" style="margin-top:6px">${eq ? `${escudoEquipoHTML(eq, 16)}${esc(eq.nombre_equipo)}` : 'Sin equipo'}</p>
            ${a.instrumento ? `<p class="secundario" style="display:flex;align-items:center;gap:6px;margin-top:6px">${iconoInstrumento(a.instrumento, 16)} ${esc(a.instrumento)}</p>` : ''}
            <p class="secundario" style="margin-top:6px">${activo(a) ? 'Activo' : 'Inactivo'}</p>
          </div>
        </div>
      </div>
      <div class="card lider">
        <div class="etiqueta"><span>🏅</span>Resumen (curso completo)</div>
        <p class="principal">${posActual ? '#' + posActual.pos : '—'}</p>
        <p class="secundario" style="font-size:16px">${st.puntos} pts en ${st.jornadas} jornada(s) · media ${fmtMedia(st.media)}</p>
        ${equipoStats ? `<p class="secundario" style="margin-top:8px">Equipo: #${equipoStats.pos} · media ${fmtMedia(equipoStats.media)}</p>` : ''}
      </div>
    </div>
    <div class="card" style="margin-top:14px">
      <h3>Insignias conseguidas</h3>
      ${insigniasDetalle.length > 0
        ? `<div class="grid-insignias">${insigniasDetalle.map(tarjetaInsigniaAlumnoHTML).join('')}</div>`
        : `<p class="nota">Todavía no ha conseguido ninguna insignia.</p>`}
    </div>
    <div class="card tabla-scroll" style="margin-top:14px">
      <h3>Historial de jornadas (${historial.length})</h3>
      ${historial.length === 0 ? `<p class="nota">Todavía no tiene ningún registro de puntuación.</p>` : `
      <table class="tabla-admin">
        <thead><tr>
          <th>Jornada</th><th>Publicación</th><th>Estado</th><th>Calidad</th>
          <th>Entrega</th><th>Corrección</th><th style="text-align:center">Total</th><th>Racha</th><th>Comentario</th>
        </tr></thead>
        <tbody>${historial.map(({ r, j }) => `
          <tr>
            <td><strong>J${esc(j.numero_jornada)}</strong> · ${esc(j.titulo || 'Sin título')}</td>
            <td><span class="estado-chip ${String(j.estado_publicacion).toLowerCase() === 'publicada' ? 'chip-pub' : 'chip-borr'}">${esc(j.estado_publicacion)}</span></td>
            <td>${esc(r.estado_entrega || '—')}</td>
            <td>${r.calidad === '' || r.calidad == null ? '—' : esc(r.calidad)}</td>
            <td>${esc(r.entrega_puntualidad)}</td>
            <td>${esc(r.correccion)}</td>
            <td style="text-align:center"><strong>${esc(r.total)}</strong></td>
            <td>${r.racha_manual === '' || r.racha_manual == null ? '—' : esc(r.racha_manual)}</td>

        </tbody>
      </table>`}
    </div>
    ${crits.length > 0 ? `<div class="card tabla-scroll" style="margin-top:14px">
      <h3>Diana de evaluación</h3>
      <table class="tabla-admin">
        <thead><tr><th>Criterio</th>${PERIODOS_DIANA.map(([, l]) => `<th>${l}</th>`).join('')}</tr></thead>
        <tbody>${crits.map(c => `
          <tr>
            <td><strong>${esc(c.nombre)}</strong></td>
            ${PERIODOS_DIANA.map(([p]) => {

            }).join('')}
          </tr>`).join('')}
        </tbody>
      </table>
    </div>` : ''}`;
}

function wireGrupos() {
  document.querySelectorAll('[data-editar-curso]').forEach(b =>
    b.addEventListener('click', () => { ADMIN.editCurso = b.dataset.editarCurso; renderAdmin(); }));
  const cancelarCurso = $('#cu-cancelar');
  if (cancelarCurso) cancelarCurso.addEventListener('click', () => { ADMIN.editCurso = null; renderAdmin(); });

  document.querySelectorAll('[data-editar-grupo]').forEach(b =>
    b.addEventListener('click', () => { ADMIN.editGrupo = b.dataset.editarGrupo; renderAdmin(); }));
  const cancelarGrupo = $('#gr-cancelar');
  if (cancelarGrupo) cancelarGrupo.addEventListener('click', () => { ADMIN.editGrupo = null; renderAdmin(); });

  $('#cu-guardar').addEventListener('click', e =>
    operar(e.target, async () => {
      const datos = {
        id_curso: ADMIN.editCurso || '',
        nombre_curso: valorDe('cu-nombre'),
        activo: marcado('cu-activo'),
      };
      if (!datos.nombre_curso) throw new Error('El curso necesita un nombre.');
      const res = await postScript('saveCurso', { datos });
      const local = { ...datos, id_curso: res.id_curso, activo: datos.activo ? 'TRUE' : 'FALSE' };
      const i = DATOS.cursos.findIndex(x => String(x.id_curso) === String(res.id_curso));
      if (i >= 0) DATOS.cursos[i] = { ...DATOS.cursos[i], ...local }; else DATOS.cursos.push(local);
      const esEdicion = !!ADMIN.editCurso;
      ADMIN.editCurso = null;
      return esEdicion ? 'Curso actualizado.' : 'Curso creado.';
    }));

  $('#gr-guardar').addEventListener('click', e =>
    operar(e.target, async () => {
      const datos = {
        id_grupo: ADMIN.editGrupo || '',
        nombre_grupo: valorDe('gr-nombre'),
        id_curso: valorDe('gr-curso'),
        activo: marcado('gr-activo'),
      };
      if (!datos.nombre_grupo) throw new Error('El grupo necesita un nombre.');
      if (!datos.id_curso) throw new Error('El grupo necesita un curso.');
      const res = await postScript('saveGrupo', { datos });
      const local = { ...datos, id_grupo: res.id_grupo, activo: datos.activo ? 'TRUE' : 'FALSE' };
      const i = DATOS.grupos.findIndex(x => String(x.id_grupo) === String(res.id_grupo));
      if (i >= 0) DATOS.grupos[i] = { ...DATOS.grupos[i], ...local }; else DATOS.grupos.push(local);
      const esEdicion = !!ADMIN.editGrupo;
      ADMIN.editGrupo = null;
      return esEdicion ? 'Grupo actualizado.' : 'Grupo creado.';
    }));

  document.querySelectorAll('[data-alumno] [data-asignar-curso]').forEach(sel => {
    sel.addEventListener('change', () => {
      const tr = sel.closest('[data-alumno]');
      ADMIN.asignacionesCurso[tr.dataset.alumno] = sel.value;
    });
  });

  document.querySelectorAll('[data-alumno] [data-asignar-grupo]').forEach(sel => {
    sel.addEventListener('change', () => {
      const tr = sel.closest('[data-alumno]');
      ADMIN.asignacionesGrupo[tr.dataset.alumno] = sel.value;
      if (sel.value) {
        const g = grupoDe(DATOS, sel.value);
        const selCurso = tr.querySelector('[data-asignar-curso]');
        if (g && selCurso) { selCurso.value = g.id_curso; ADMIN.asignacionesCurso[tr.dataset.alumno] = g.id_curso; }
      }
    });
  });

  const btnGuardarAsig = $('#ga-guardar');
  if (btnGuardarAsig) btnGuardarAsig.addEventListener('click', e =>
    operar(e.target, async () => {
      const filas = document.querySelectorAll('[data-alumno]');
      const asignaciones = Array.from(filas).map(tr => ({
        id_alumno: tr.dataset.alumno,
        id_curso: tr.querySelector('[data-asignar-curso]').value,
        id_grupo: tr.querySelector('[data-asignar-grupo]').value,
      }));
      await postScript('saveAsignacionesGrupo', { asignaciones });
      asignaciones.forEach(a => {
        const al = DATOS.alumnos.find(x => String(x.id_alumno) === String(a.id_alumno));
        if (al) { al.id_curso = a.id_curso; al.id_grupo = a.id_grupo; }
      });
      ADMIN.asignacionesCurso = {};
      ADMIN.asignacionesGrupo = {};
      return 'Asignaciones guardadas.';
    }));
}

function wireEquipos() {
  document.querySelectorAll('[data-editar]').forEach(b =>
    b.addEventListener('click', () => { ADMIN.editEquipo = b.dataset.editar; ADMIN.imagenEscudo = null; renderAdmin(); }));

  const inputEscudo = $('#e-escudo');

    const file = inputEscudo.files[0];

    try {
      const redimensionada = await leerImagenRedimensionada(file);
      ADMIN.imagenEscudo = await quitarFondoImagen(redimensionada);
      renderAdmin();
    } catch (err) {
      alert(err.message);
      inputEscudo.value = '';
    }
  });
  const quitarEscudo = $('#e-escudo-quitar');
  if (quitarEscudo) quitarEscudo.addEventListener('click', () => { ADMIN.imagenEscudo = ''; renderAdmin(); });

  $('#e-guardar').addEventListener('click', e =>
    operar(e.target, async () => {
      const ed = ADMIN.editEquipo ? DATOS.equipos.find(x => String(x.id_equipo) === String(ADMIN.editEquipo)) : null;
      const datos = {
        id_equipo: ADMIN.editEquipo || '',
        nombre_equipo: valorDe('e-nombre'),
        color: valorDe('e-color') || '#888888',
        id_curso: valorDe('e-curso'),
        activo: marcado('e-activo'),
        escudo: ADMIN.imagenEscudo !== null ? ADMIN.imagenEscudo : (ed ? (ed.escudo || '') : ''),
      };
      if (!datos.nombre_equipo) throw new Error('El equipo necesita un nombre.');
      const res = await postScript('saveEquipo', { datos });
      const local = { ...datos, id_equipo: res.id_equipo, escudo: res.escudo, activo: datos.activo ? 'TRUE' : 'FALSE' };
      const i = DATOS.equipos.findIndex(x => String(x.id_equipo) === String(res.id_equipo));
      if (i >= 0) DATOS.equipos[i] = { ...DATOS.equipos[i], ...local }; else DATOS.equipos.push(local);
      const esEdicion = !!ADMIN.editEquipo;
      ADMIN.editEquipo = null;
      ADMIN.imagenEscudo = null;
      return esEdicion ? 'Equipo actualizado.' : 'Equipo creado.';
    }));
}

/* ---------- Sección: Criterios (diana de evaluación) ---------- */

function seccionCriterios() {
  const ed = ADMIN.editCriterio
    ? DATOS.criterios.find(c => String(c.id_criterio) === String(ADMIN.editCriterio))
    : null;
  const ordenSugerido = DATOS.criterios.reduce((m, c) => Math.max(m, num(c.orden)), 0) + 1;
  const ordenados = [...DATOS.criterios].sort((a, b) => num(a.orden) - num(b.orden));

  return `
    <div class="card" style="margin-bottom:14px">
      <h3>${ed ? `Editar: ${esc(ed.nombre)}` : 'Nuevo criterio'}</h3>
      <div class="form-grid">
        <label>Nombre del criterio<input type="text" id="cr-nombre" value="${ed ? esc(ed.nombre) : ''}" placeholder="p. ej. Afinación" /></label>
        <label>Orden en la diana<input type="number" id="cr-orden" min="0" value="${ed ? esc(ed.orden) : ordenSugerido}" /></label>
        <label class="check"><input type="checkbox" id="cr-activo" ${!ed || activo(ed) ? 'checked' : ''} /> Activo (aparece en la diana de evaluación)</label>
      </div>
      <div class="admin-barra" style="margin-top:14px">
        <button class="btn-oro" id="cr-guardar">${ed ? 'Guardar cambios' : 'Crear criterio'}</button>
        ${ed ? `<button class="btn-borde" id="cr-cancelar">Cancelar</button>` : ''}
      </div>
      <p class="nota">La diana necesita al menos 3 criterios activos para poder dibujarse. Si desactivas
      un criterio, sus valoraciones ya guardadas se conservan pero dejan de mostrarse.</p>
    </div>
    <div class="card tabla-scroll">
      <h3>Criterios (${DATOS.criterios.length})</h3>
      ${DATOS.criterios.length === 0 ? `<p class="nota">Todavía no hay criterios.</p>` : `
      <table>
        <thead><tr><th class="num">Orden</th><th>Criterio</th><th>Estado</th><th></th></tr></thead>
        <tbody>${ordenados.map(c => `
          <tr style="${activo(c) ? '' : 'opacity:0.45'}">
            <td class="num">${esc(c.orden)}</td>
            <td><strong>${esc(c.nombre)}</strong></td>
            <td>${activo(c) ? 'Activo' : 'Inactivo'}</td>
            <td style="text-align:right">
              <button class="btn-borde btn-mini" data-editar="${esc(c.id_criterio)}" style="margin-right:6px">Editar</button>
              <button class="btn-borde btn-mini" data-eliminar="${esc(c.id_criterio)}">Eliminar</button>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>`}
    </div>`;
}

function wireCriterios() {
  document.querySelectorAll('[data-editar]').forEach(b =>
    b.addEventListener('click', () => { ADMIN.editCriterio = b.dataset.editar; renderAdmin(); }));
  const cancelar = $('#cr-cancelar');
  if (cancelar) cancelar.addEventListener('click', () => { ADMIN.editCriterio = null; renderAdmin(); });

  document.querySelectorAll('[data-eliminar]').forEach(b =>
    b.addEventListener('click', e => {
      const id = b.dataset.eliminar;
      const c = DATOS.criterios.find(x => String(x.id_criterio) === String(id));
      const nombre = c ? c.nombre : id;
      const tieneValoraciones = DATOS.evaluaciones.some(ev => String(ev.id_criterio) === String(id) && ev.valor !== '');
      const aviso = tieneValoraciones
        ? `¿Eliminar el criterio «${nombre}»? Ya tiene valoraciones guardadas: dejarán de mostrarse en las dianas. Esta acción no se puede deshacer.`
        : `¿Eliminar el criterio «${nombre}»? Esta acción no se puede deshacer.`;
      if (!confirm(aviso)) return;
      operar(e.target, async () => {
        await postScript('deleteCriterio', { id_criterio: id });
        DATOS.criterios = DATOS.criterios.filter(x => String(x.id_criterio) !== String(id));
        ADMIN.filasDianaAlumno = {};
        if (String(ADMIN.editCriterio) === String(id)) ADMIN.editCriterio = null;
        return 'Criterio eliminado.';
      });
    }));

  $('#cr-guardar').addEventListener('click', e =>
    operar(e.target, async () => {
      const datos = {
        id_criterio: ADMIN.editCriterio || '',
        nombre: valorDe('cr-nombre'),
        orden: valorDe('cr-orden') || '0',
        activo: marcado('cr-activo'),
      };
      if (!datos.nombre) throw new Error('El criterio necesita un nombre.');
      const res = await postScript('saveCriterio', { datos });
      const local = { ...datos, id_criterio: res.id_criterio, activo: datos.activo ? 'TRUE' : 'FALSE' };
      const i = DATOS.criterios.findIndex(x => String(x.id_criterio) === String(res.id_criterio));
      if (i >= 0) DATOS.criterios[i] = { ...DATOS.criterios[i], ...local }; else DATOS.criterios.push(local);
      ADMIN.filasDianaAlumno = {}; // el panel de diana por alumno cambia si varían los criterios activos
      const esEdicion = !!ADMIN.editCriterio;
      ADMIN.editCriterio = null;
      return esEdicion ? 'Criterio actualizado.' : 'Criterio creado.';
    }));
}

const PERIODICIDADES_INSIGNIA = [['semanal', 'Semanal'], ['mensual', 'Mensual'], ['trimestral', 'Trimestral']];

/** Lee un archivo de imagen, lo reduce a `maxLado` px (conservando proporción) y lo devuelve como data URI PNG. */
function leerImagenRedimensionada(file, maxLado = 800) {
  return new Promise((resolve, reject) => {
    if (!file.type || !file.type.startsWith('image/')) { reject(new Error('El archivo elegido no es una imagen.')); return; }
    if (file.size > 5 * 1024 * 1024) { reject(new Error('La imagen no puede pesar más de 5 MB.')); return; }
    const lector = new FileReader();
    lector.onerror = () => reject(new Error('No se pudo leer el archivo.'));
    lector.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('El archivo no es una imagen válida.'));
      img.onload = () => {
        let { width, height } = img;
        if (width > maxLado || height > maxLado) {
          if (width >= height) { height = Math.round(height * maxLado / width); width = maxLado; }
          else { width = Math.round(width * maxLado / height); height = maxLado; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/png'));
      };
      img.src = lector.result;
    };
    lector.readAsDataURL(file);
  });
}

/** Lee un archivo de audio como data URI, sin transformarlo (solo valida tipo y tamaño). */
function leerAudioComoDataURI(file, maxMB = 15) {
  return new Promise((resolve, reject) => {
    if (!file.type || !file.type.startsWith('audio/')) { reject(new Error('El archivo elegido no es un audio.')); return; }
    if (file.size > maxMB * 1024 * 1024) { reject(new Error(`El audio no puede pesar más de ${maxMB} MB.`)); return; }
    const lector = new FileReader();
    lector.onerror = () => reject(new Error('No se pudo leer el archivo.'));
    lector.onload = () => resolve(lector.result);
    lector.readAsDataURL(file);
  });
}

/**
 * Quita el fondo de una imagen tipo logo/escudo: asume que el fondo es del
 * color de las esquinas y lo vuelve transparente por inundación desde los
 * bordes, sin tocar zonas del interior que compartan ese color pero no
 * toquen el borde (así no agujerea el propio dibujo del escudo).
 */
function quitarFondoImagen(dataUrl, tolerancia = 32) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onerror = () => reject(new Error('No se pudo procesar la imagen.'));
    img.onload = () => {
      const { width, height } = img;
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const imagen = ctx.getImageData(0, 0, width, height);
      const px = imagen.data;
      const idx = (x, y) => (y * width + x) * 4;

      const esquinas = [idx(0, 0), idx(width - 1, 0), idx(0, height - 1), idx(width - 1, height - 1)];
      const fondo = [0, 1, 2].map(c => esquinas.reduce((s, i) => s + px[i + c], 0) / esquinas.length);
      const pareceFondo = i => {
        const dr = px[i] - fondo[0], dg = px[i + 1] - fondo[1], db = px[i + 2] - fondo[2];
        return Math.sqrt(dr * dr + dg * dg + db * db) <= tolerancia;
      };

      const visitado = new Uint8Array(width * height);
      const pila = [];
      for (let x = 0; x < width; x++) { pila.push(x, 0, x, height - 1); }
      for (let y = 0; y < height; y++) { pila.push(0, y, width - 1, y); }

      while (pila.length) {
        const y = pila.pop(), x = pila.pop();
        if (x < 0 || y < 0 || x >= width || y >= height) continue;
        const p = y * width + x;
        if (visitado[p]) continue;
        visitado[p] = 1;
        const i = p * 4;
        if (!pareceFondo(i)) continue;
        px[i + 3] = 0;
        pila.push(x + 1, y, x - 1, y, x, y + 1, x, y - 1);
      }

      ctx.putImageData(imagen, 0, 0);
      resolve(canvas.toDataURL('image/png'));
    };
    img.src = dataUrl;
  });
}

function etiquetaPeriodicidad(v) {
  const par = PERIODICIDADES_INSIGNIA.find(([val]) => val === v);
  return par ? par[1] : v;
}

const ICONOS_INSIGNIA = ['🏆', '🥇', '🥈', '🥉', '⭐', '🌟', '🎖️', '🔥', '💎', '👑', '🎯', '🎵', '🎶', '🎸', '🎹', '🥁', '🚀', '💪', '✨', '🎓'];

function paletaIconos(seleccionado) {
  return `<div class="paleta-iconos">${ICONOS_INSIGNIA.map(ic =>
    `<button type="button" class="icono-opcion ${seleccionado === ic ? 'on' : ''}" data-icono="${ic}">${ic}</button>`).join('')}</div>`;
}

/** Vista previa del icono elegido (o uno genérico si todavía no hay ninguno). */
function previewIconoInsigniaHTML(icono) {

}

/** Vista previa del escudo subido, o un hueco vacío si todavía no hay ninguno. */
function previewEscudoInsigniaHTML(imagen) {

  return `<div class="imagen-preview vacia" id="in-preview-escudo">🛡️</div>`;
}

/** Miniatura para resúmenes (tablas, listados): siempre el icono, nunca el escudo. */
function miniaturaInsigniaHTML(i) {
  return `<span class="miniatura-insignia" style="display:inline-flex;align-items:center;justify-content:center;font-size:18px">${esc(i.icono || '🎖️')}</span>`;
}

function seccionInsignias() {
  const ed = ADMIN.editInsignia
    ? DATOS.insignias.find(i => String(i.id_insignia) === String(ADMIN.editInsignia))
    : null;
  const imagenActual = ADMIN.imagenInsignia !== null ? ADMIN.imagenInsignia : (ed ? ed.imagen : '');
  const iconoActual = ADMIN.iconoInsignia !== null ? ADMIN.iconoInsignia : (ed ? ed.icono : '');

  return `
    <div class="card" style="margin-bottom:14px">
      <h3>${ed ? `Editar: ${esc(ed.nombre)}` : 'Nueva insignia'}</h3>

            ${previewIconoInsigniaHTML(iconoActual)}
            ${paletaIconos(iconoActual)}
          </div>

        <label style="grid-column:1/-1">Escudo (opcional; se usa en grande en el Salón de la Fama)
          <div class="admin-barra" style="margin-top:6px;align-items:flex-start">
            ${previewEscudoInsigniaHTML(imagenActual)}
            <div style="display:flex;flex-direction:column;gap:8px">
              <input type="file" id="in-imagen" accept="image/*" />
              ${imagenActual ? `<button type="button" class="btn-borde btn-mini" id="in-imagen-quitar">Quitar escudo</button>` : ''}

      </div>

        <button class="btn-oro" id="in-guardar">${ed ? 'Guardar cambios' : 'Crear insignia'}</button>

      muestra en pequeño (listados, resúmenes...) y el escudo, si lo subes, se muestra grande en el Salón de la
      Fama sin recortar aunque no sea cuadrado — si no subes ningún escudo, ahí también se usa el icono. Al subirlo
      se intenta quitar el fondo automáticamente y se reduce a un máximo de 800×800 px antes de guardarse en tu
      Google Drive (carpeta «Liga Armónica — Insignias»).</p>
    </div>
    <div class="card tabla-scroll">
      <h3>Insignias (${DATOS.insignias.length})</h3>

          </tr>`).join('')}

}

function wireInsignias() {
  document.querySelectorAll('[data-editar]').forEach(b =>
    b.addEventListener('click', () => { ADMIN.editInsignia = b.dataset.editar; ADMIN.imagenInsignia = null; ADMIN.iconoInsignia = null; renderAdmin(); }));
  const cancelar = $('#in-cancelar');
  if (cancelar) cancelar.addEventListener('click', () => { ADMIN.editInsignia = null; ADMIN.imagenInsignia = null; ADMIN.iconoInsignia = null; renderAdmin(); });

  const inputImagen = $('#in-imagen');
  if (inputImagen) inputImagen.addEventListener('change', async () => {
    const file = inputImagen.files[0];
    if (!file) return;
    try {
      const redimensionada = await leerImagenRedimensionada(file);
      ADMIN.imagenInsignia = await quitarFondoImagen(redimensionada);
      renderAdmin();
    } catch (err) {
      alert(err.message);
      inputImagen.value = '';
    }
  });
  const quitarImagen = $('#in-imagen-quitar');
  if (quitarImagen) quitarImagen.addEventListener('click', () => { ADMIN.imagenInsignia = ''; renderAdmin(); });

  document.querySelectorAll('[data-icono]').forEach(b =>
    b.addEventListener('click', () => {
      ADMIN.iconoInsignia = b.dataset.icono;
      renderAdmin();
    }));

  $('#in-guardar').addEventListener('click', e =>
    operar(e.target, async () => {
      const ed = ADMIN.editInsignia ? DATOS.insignias.find(i => String(i.id_insignia) === String(ADMIN.editInsignia)) : null;
      const datos = {
        id_insignia: ADMIN.editInsignia || '',
        nombre: valorDe('in-nombre'),
        periodicidad: valorDe('in-periodicidad'),
        icono: ADMIN.iconoInsignia !== null ? ADMIN.iconoInsignia : (ed ? (ed.icono || '') : ''),
        imagen: ADMIN.imagenInsignia !== null ? ADMIN.imagenInsignia : (ed ? (ed.imagen || '') : ''),
        activo: marcado('in-activo'),
      };
      if (!datos.nombre) throw new Error('La insignia necesita un nombre.');
      const res = await postScript('saveInsignia', { datos });
      const local = { ...datos, id_insignia: res.id_insignia, imagen: res.imagen, activo: datos.activo ? 'TRUE' : 'FALSE' };
      const i = DATOS.insignias.findIndex(x => String(x.id_insignia) === String(res.id_insignia));
      if (i >= 0) DATOS.insignias[i] = { ...DATOS.insignias[i], ...local }; else DATOS.insignias.push(local);
      const esEdicion = !!ADMIN.editInsignia;
      ADMIN.editInsignia = null;
      ADMIN.imagenInsignia = null;
      ADMIN.iconoInsignia = null;
      return esEdicion ? 'Insignia actualizada.' : 'Insignia creada.';
    }));
}

      que la música empieza justo al pulsar «Entrar».</p>
    </div>
    <div class="card" style="margin-top:14px">
      <h3>Reglas de la liga</h3>
      <p class="nota" style="margin-top:0">Este texto (con el formato que le des) se muestra tal cual en la

      <div class="editor-barra" id="c-reglas-barra">

        <button type="button" class="btn-borde btn-mini" data-cmd="underline"><u>S</u></button>

        </label>
        <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--muted)" title="Color de los títulos (Título grande/mediano/pequeño)">

        <button type="button" class="btn-borde btn-mini" id="c-reglas-tabla">▦ Tabla</button>
        <button type="button" class="btn-borde btn-mini" data-cmd="removeFormat">Quitar formato</button>
      </div>
      <div id="c-reglas-editor" class="editor-caja" contenteditable="true"
        data-placeholder="Explica aquí qué es la liga y sus reglas: cómo se puntúa cada jornada, cómo funcionan las clasificaciones individual y por equipos, las insignias..."
      >${contenidoInicialReglas(c.reglas_texto)}</div>
    </div>`;
}

function wireLiga() {
  const inputAudio = $('#c-bienvenida-archivo');
  if (inputAudio) inputAudio.addEventListener('change', async () => {
    const file = inputAudio.files[0];
    if (!file) return;
    try {
      ADMIN.audioBienvenida = await leerAudioComoDataURI(file);
      renderAdmin();
    } catch (err) {
      alert(err.message);
      inputAudio.value = '';
    }
  });
  const quitarAudio = $('#c-bienvenida-archivo-quitar');
  if (quitarAudio) quitarAudio.addEventListener('click', () => { ADMIN.audioBienvenida = null; renderAdmin(); });

  // Editor de Reglas: una barra mínima sobre document.execCommand (sin
  // librerías externas) para negrita/cursiva/subrayado, encabezados,
  // tamaño de letra, colores y listas.
  const editorReglas = $('#c-reglas-editor');
  if (editorReglas) {
    // Sin esto, el navegador aplica los colores con la etiqueta antigua
    // <font color="...">, y un atributo de presentación como ese SIEMPRE
    // pierde frente a cualquier regla CSS de la página (p. ej. la que fija
    // el color de párrafo en la pestaña pública Reglas), aunque en el
    // editor se vea bien: el color "desaparece" al guardar. Con styleWithCSS
    // activado, el color se aplica como <span style="color:...">, que sí
    // tiene prioridad sobre el CSS del sitio y además ya está permitido por
    // el sanitizador.
    document.execCommand('styleWithCSS', false, true);

    // Los <select> y los selectores de color nativos "roban" el foco del
    // editor al abrirse (y con él, el texto seleccionado); se guarda la
    // selección mientras se escribe y se restaura justo antes de aplicar
    // el comando, para que el color/tamaño se aplique a lo que se había
    // seleccionado y no a donde quedara el cursor por última vez.
    let ultimaSeleccion = null;
    const guardarSeleccion = () => {
      const sel = window.getSelection();
      if (sel && sel.rangeCount > 0 && editorReglas.contains(sel.anchorNode)) {
        ultimaSeleccion = sel.getRangeAt(0);
      }
    };
    const restaurarSeleccion = () => {
      if (!ultimaSeleccion) return;
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(ultimaSeleccion);
    };
    editorReglas.addEventListener('mouseup', guardarSeleccion);
    editorReglas.addEventListener('keyup', guardarSeleccion);

    // Color de los títulos (Título grande/mediano/pequeño): se aplica a
    // todos los encabezados del documento a la vez, tanto al elegir un
    // color nuevo como cada vez que se crea un encabezado, para que todos
    // usen siempre el mismo color sin tener que repetirlo uno a uno.
    const aplicarColorTitulos = () => {
      const input = $('#c-reglas-color-titulos');
      if (!input) return;
      editorReglas.querySelectorAll('h1, h2, h3, h4').forEach(h => { h.style.color = input.value; });
    };

    // Al pegar de Word/Google Docs/una web, el navegador por defecto mete
    // tal cual todo el HTML de origen (fuentes, clases, márgenes, tablas
    // anidadas...), que luego se recorta de golpe al guardar y da la
    // sensación de que el color o el formato "se pierden". En vez de eso,
    // se limpia el HTML pegado al vuelo con el mismo saneador de guardar,
    // así lo que se ve al pegar ya es exactamente lo que se va a publicar.
    editorReglas.addEventListener('paste', e => {
      e.preventDefault();
      const portapapeles = e.clipboardData || window.clipboardData;
      const html = portapapeles.getData('text/html');
      editorReglas.focus();
      if (html && pareceHTML(html)) {
        document.execCommand('insertHTML', false, sanitizarHTML(html));
      } else {
        document.execCommand('insertText', false, portapapeles.getData('text/plain'));
      }
      convertirFontASpanEnVivo(editorReglas);
    });

    document.querySelectorAll('#c-reglas-barra [data-cmd]').forEach(boton => {
      // Evita que el propio botón robe el foco al pulsarlo (si no, se
      // perdería la selección antes de que el click llegue a ejecutarse).
      boton.addEventListener('mousedown', e => e.preventDefault());
      boton.addEventListener('click', () => {
        editorReglas.focus();
        document.execCommand(boton.dataset.cmd, false, null);
      });
    });
    const selBloque = $('#c-reglas-bloque');
    if (selBloque) selBloque.addEventListener('change', () => {
      editorReglas.focus();
      restaurarSeleccion();
      document.execCommand('formatBlock', false, selBloque.value);
      aplicarColorTitulos();
      selBloque.value = 'P';
    });
    const selTamano = $('#c-reglas-tamano');
    if (selTamano) selTamano.addEventListener('change', () => {
      if (!selTamano.value) return;
      editorReglas.focus();
      restaurarSeleccion();
      document.execCommand('fontSize', false, selTamano.value);
      selTamano.value = '';
    });
    const inputColor = $('#c-reglas-color');
    if (inputColor) inputColor.addEventListener('input', () => {
      editorReglas.focus();
      restaurarSeleccion();
      document.execCommand('styleWithCSS', false, true);
      document.execCommand('foreColor', false, inputColor.value);
      convertirFontASpanEnVivo(editorReglas);
    });
    const inputTitulos = $('#c-reglas-color-titulos');
    if (inputTitulos) inputTitulos.addEventListener('input', aplicarColorTitulos);
    const btnTabla = $('#c-reglas-tabla');
    if (btnTabla) {
      // Como con el resto de botones de la barra: sin este preventDefault,
      // el propio click le quita el foco al editor y se pierde la selección
      // guardada antes de llegar a insertar la tabla.
      btnTabla.addEventListener('mousedown', e => e.preventDefault());
      btnTabla.addEventListener('click', () => {
        const filas = parseInt(prompt('¿Cuántas filas (la primera será la cabecera)?', '3'), 10);
        if (!filas || filas < 1 || filas > 30) return;
        const columnas = parseInt(prompt('¿Cuántas columnas?', '3'), 10);
        if (!columnas || columnas < 1 || columnas > 10) return;
        editorReglas.focus();
        restaurarSeleccion();
        let filasHtml = '';
        for (let f = 0; f < filas; f++) {
          const etiqueta = f === 0 ? 'th' : 'td';
          filasHtml += `<tr>${`<${etiqueta}>&nbsp;</${etiqueta}>`.repeat(columnas)}</tr>`;
        }
        document.execCommand('insertHTML', false, `<table><tbody>${filasHtml}</tbody></table><p><br></p>`);
      });
    }
  }

  $('#c-guardar').addEventListener('click', e =>
    operar(e.target, async () => {
      const candidato = {
        nombre_liga: valorDe('c-nombre'),
        curso: valorDe('c-curso'),
        profesor: valorDe('c-profesor'),
        trimestre_activo: valorDe('c-trimestre'),
        jornada_actual: valorDe('c-jornada'),
        mostrar_tendencia_alumnos: marcado('c-tend-alumnos') ? 'TRUE' : 'FALSE',
        mostrar_tendencia_equipos: marcado('c-tend-equipos') ? 'TRUE' : 'FALSE',
        mostrar_tendencia_numero: marcado('c-tend-numero') ? 'TRUE' : 'FALSE',
        mostrar_podio: marcado('c-podio') ? 'TRUE' : 'FALSE',
        mostrar_todos_cursos: marcado('c-todos-cursos') ? 'TRUE' : 'FALSE',
        bienvenida_activa: marcado('c-bienvenida') ? 'TRUE' : 'FALSE',
        bienvenida_musica_activa: marcado('c-bienvenida-musica-activa') ? 'TRUE' : 'FALSE',
        bienvenida_musica_url: ADMIN.audioBienvenida !== null ? ADMIN.audioBienvenida : valorDe('c-bienvenida-musica'),
        tour_activo: marcado('c-tour') ? 'TRUE' : 'FALSE',
        reglas_texto: editorReglas ? sanitizarHTML(editorReglas.innerHTML).trim() : '',
      };
      // Solo se manda (y por tanto solo se toca en la hoja) lo que de verdad
      // ha cambiado respecto a lo último que se sabe que hay guardado: así
      // una modificación puntual no arrastra ni vuelve a escribir el resto
      // de ajustes con lo que ya había (evita pisar algo con una copia local
      // desactualizada, p. ej. justo después de una subida de audio).
      const config = {};
      Object.keys(candidato).forEach(clave => {
        const huboArchivoNuevo = clave === 'bienvenida_musica_url' && ADMIN.audioBienvenida !== null;
        if (huboArchivoNuevo || String(candidato[clave] || '') !== String(DATOS.config[clave] || '')) {
          config[clave] = candidato[clave];
        }
      });
      if (Object.keys(config).length === 0) {
        ADMIN.audioBienvenida = null;
        return 'No había ningún cambio que guardar.';
      }

      const res = await postScript('saveConfig', { config });
      // Si la subida del audio falló en el servidor, la respuesta no trae
      // bienvenida_musica_url a propósito: no hay que pisar el valor local
      // que ya teníamos (para no hacerlo desaparecer también en esta pestaña).
      if ('bienvenida_musica_url' in res) config.bienvenida_musica_url = res.bienvenida_musica_url;
      else delete config.bienvenida_musica_url;
      Object.assign(DATOS.config, config);
      ADMIN.audioBienvenida = null;
      // Refrescar cabecera
      if (config.nombre_liga) { $('#titulo').textContent = DATOS.config.nombre_liga; document.title = DATOS.config.nombre_liga; }
      if (config.curso) { $('#curso').textContent = DATOS.config.curso; $('#temporada').hidden = false; }
      return res.aviso || 'Configuración guardada.';
    }));
}

/** Normaliza una fecha mostrada (dd/mm/aaaa o aaaa-mm-dd) al formato del input date. */
function fechaISO(f) {
  const s = String(f || '');
  const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return `${m[3]}-${m[2].padStart(2, '0')}-${m[1].padStart(2, '0')}`;
  return /^\d{4}-\d{2}-\d{2}$/.test(s) ? s : '';
}

/** Fecha de hoy en formato aaaa-mm-dd, para precargar el input type="date". */
function hoyISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

/** Formatea una fecha (aaaa-mm-dd o dd/mm/aaaa) como d-m-a. Si no reconoce el formato, la deja tal cual. */
function fmtFecha(f) {
  const s = String(f || '').trim();
  if (!s) return '';
  let d, m, a;
  let match = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if (match) { [, a, m, d] = match; } else {
    match = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (match) { [, d, m, a] = match; }
  }
  if (!d) return s;
  return `${d.padStart(2, '0')}-${m.padStart(2, '0')}-${a}`;
}

(async function iniciar() {
  if (!SPREADSHEET_ID || SPREADSHEET_ID.startsWith('PEGA_AQUI')) {
    ocultarSplash();
    mostrarError('Falta configurar la hoja',
      `Abre este archivo <code>index.html</code> con un editor de texto y pega el ID de tu hoja de
       Google Sheets en la constante <code>SPREADSHEET_ID</code> (al principio del archivo).
       Recuerda compartir la hoja como «Cualquier persona con el enlace: Lector».`);
    return;
  }
  try {
    const [datosCargados] = await Promise.all([cargarDatos(), cargarDicebear()]);
    DATOS = datosCargados;
    TRIMESTRE = String(DATOS.config.trimestre_activo || '1');
    if (!TRIMESTRES.some(([v]) => v === TRIMESTRE)) TRIMESTRE = '1';
    DIANA_PERIODO = ['1', '2', '3'].includes(TRIMESTRE) ? TRIMESTRE : '1';
    if (DATOS.config.nombre_liga) { $('#titulo').textContent = DATOS.config.nombre_liga; document.title = DATOS.config.nombre_liga; }
    if (DATOS.config.curso) { $('#curso').textContent = DATOS.config.curso; $('#temporada').hidden = false; }
    if (DATOS.config.profesor) { $('#pie-texto').textContent += ' · ' + DATOS.config.profesor; }
    render();
    finalizarSplash(configActivo(DATOS.config.bienvenida_activa, false));
  } catch (err) {
    ocultarSplash();
    mostrarError('No se pudieron cargar los datos',
      `${esc(err.message)}<br><br>Comprueba que el ID de la hoja es correcto, que está compartida como
       «Cualquier persona con el enlace: Lector» y que las pestañas se llaman CONFIG, ALUMNOS,
       EQUIPOS, JORNADAS, REGISTROS, CRITERIOS, EVALUACIONES, INSIGNIAS e INSIGNIAS_ALUMNOS.`);
  }
})();
